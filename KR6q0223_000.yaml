body:
  text: 木人剩稿序嘗考古而知世運之隆替與佛法之廢興皆有數存焉非人之所能為也世運則五百年始有王者興隨有名世輔長佛法則自釋尊而降代不乏人大都皆承願力再來誠非偶爾昔張方平謂王荊公曰儒門淡薄收拾不住皆歸釋氏信不誣也嗚呼彼諸大知識僉棄我而沒良以法末人漓難為教化概不肯住世為苦海慈航比諸方據室撑持祖道者亦既兢兢黽勉弗敢告勞然而經律禪淨各擅一能兼善之材無多屈指甚矣得人之難也東粵何幸迭産聖僧向大鑑而下石頭仰山等輩皆法門角虎覺苑飛龍今也則亡殊堪慨歎猶喜線傳未滅旋而崛起至人經律禪淨咸稱獨步今見我在犙和尚其人也高居鼎湖方丈尋臥麻溪象林不居祖位如良賈深藏故緇素屢請升堂不允年登古稀來吾江南長干及寧波鄧山供禮如來舍利浮圖晉雲門顯聖位中和尚力請上堂并與衆授戒皆堅辭不諾頗不類近代堂頭婆心太切多囑法嗣希圖熱鬧門庭師惟以惡辣鉗鎚陶鎔來學如大匠繩墨不為拙工改廢故根器稍劣者多望崖而退師既無心於事無事于心嘗以木人自目故鼎湖方丈後額曰木人居居可容膝面山而窗名花好鳥時開時鳴師本體無情對景宴如恬不為動於是花鳥獲適其性又從而額曰雜花苑聯曰鳥從歌旦夕花任笑冬春豈非取木人看花鳥意乎師矜正法下衰禪淨之餘注釋三藏百有餘卷以利群蒙字字津梁皆發古人所未發如良醫之應病與藥服者悉瘳緇素叩擊隨機開導莫不切中肯綮各臻玄奧侍者録其要語成帙鋟梓名曰木人剩稿屬豫序豫儒者也內典未間惡足以知師之高深哉然緬師履踐猶宮牆數仞其中美宗廟富百官有不待入而知其具足者矣因為剩稿序賜進士出身文林郎內府中書科中書舍人加一級丙辰會試充內收掌試卷官丁巳順天鄉試同考法弟子江南新都程化龍頓首拜題鼎湖山木人居在犙禪師剩稿目録卷一開示答問卷二警策尺牘卷三尺牘卷四偈頌詩贊記銘卷五序文祭文舉火行實塔銘
