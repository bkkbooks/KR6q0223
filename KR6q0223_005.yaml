body:
  text: 侍者開溈録序文四分律藏名義標釋序原夫律之為教也乃三乘之寶筏四雙之雲階諸佛從斯而趣菩提衆聖由此而升泥曰譬若明珠喻如淨雪外衆不預其傳內徒為之祕授三寶藉之而彰五輩因之以立其為法也豈不重哉在昔金河重誨波離嗣宣西域聖人師資肅佩分㲲傳持千有餘載逮流東夏漢晉創聞齊梁漸備隋唐盛興迄夫宋代已來人皆首學俱出樊籠僧同遵軌咸超有岸邇世訛鋒互舉禪律競分見既不同資受不無其謬致使後進無門初造失序展卷不識其名循文詎能知義贊始臨壇還同昏穴惟此奮翅三藏獵目群章稽彼西天之梵言釋此東華之音議端取曇無德律所有文句難通者僅標其名纘釋其義傍採諸家之辨正述經論之玄雖引四部之要文然不雜彼之宗緒恐紊持犯難為防護間所述者並是通途行事及略顯開遮庶知持犯有其同別非取輕條以替重篇卻大愆而易小過蓋本聖意未許律旨全遮偷心不絶難言信戒是以獨舉一部隨事標釋不舛餘宗俾創學者覽卷無滯溫習者不觀他面罔致迷文失旨意莫適從遂舉手於高閣不再顧以終身律學於斯頓止僧寶從此漸替維念於茲敢興短聞集為部夾統釋事相略明樞義若夫開遮持犯廣備律詮性制輕重玩之即得對治煩惑要在深研此不預述況贊之淺識豈能窮其淵府俟學充足戒光自朗其餘纖悉玄軌疏律乃陳此所先標後不重出以彼疏意易彰理獲線貫帙今成矣但愧庸才難免鬻乳之併所缺疑未備者總冀來哲共昭南極輝戒珠於長夜昺慧日於中天正法得之恆存聖階固而永久是所慶願智者鑒諸四分戒本如釋序夫戒本者何乃比丘之規矱涅槃之津要規矱失則心慮無整津要迷則彼岸難到故如來首自鹿苑終乎鶴樹諄諄誨囑俾依木叉為師視同如佛今人背遺囑詆毗尼何異逆子而抗慈父善星而侮聖言背遺囑是非佛也詆毗尼是非法也見持戒者而嘲𠿝是非僧也三寶既非而且毀奚名釋子蓋戒法乃對治無明業種之醍醐修證五分法身之妙術業種不斷因流瀰漫法身不圓解脫無日違此而修縱得妙悟禪定現前終是魔業經有明言非人臆語今時妄修謬證置木叉于言外取己見為自規尺自不能持欲他而同己僻毀法滅律無堪視之豫因睹此每勸初學著目毗尼使定慧有址正法而得久住第律文旨奧止持作犯名種性相閲者無不茫然乃忞自庸力取戒本如律釋之故曰如釋釋而未盡附餘部以悉之僅為律之首鑰以學者而疏通蹊徑文蹄雖約而義階實周其有欲登舍那殿閣者可向此跨上一足授比丘戒録序恭惟如來御世觀衆生機有上中下故教設三乘所謂菩薩緣覺聲聞也乘雖分三莫不以戒為定慧之本是故如來初坐菩提樹下即為諸大心菩薩傳誦盧舍那佛三聚淨戒次至鹿苑王城為諸二乘漸制五篇七聚立十人僧白四羯磨授比丘具足戒然佛初出世邊地鮮聞正法出家五衆亦希時迦旃延尊者居西天竺阿槃提國彼有長者子名億耳出家求尊者為受具戒而彼國無十人僧不得受具彼馳往白佛佛聽邊地持律五人僧得作羯磨受具五人中須一人持律善解羯磨即以羯磨師為第五人其教授師要聞軌範餘證戒僧必須清淨方許為證明也所謂中邊者中即中天竺居東南西北四天竺之中也邊地者中天竺東去至東際有白木調國國外是邊地南去至南際有靖善塔塔外是邊地西去至西際有一師黎仙人山山外是邊地北去至北際有柱國國外是邊地今此震旦在白木調東去天竺五萬七千餘里如來出世一千餘載未聞佛法至漢明帝永平三年帝感瑞夢乃遣將軍蔡愔等一十八人使西域訪求佛道六年愔等至月氏國遇摩騰法蘭二法師得梵本經六十萬言相與東還明帝大悅由是此方王臣士庶漸知歸向至十四年司空陽城侯劉峻與諸官人士庶等一千餘人出家陰夫人王婕妤等與宮婦女二百三十人出家時二法師與諸人出家剃除鬚髮著縵條衣授與三歸五戒十戒而已以不得滿十人五人僧授具足戒後至漢第十桓帝一百餘年內猶三歸五戒十戒遞相傳授至漢靈帝建寧元年有北天竺沙門五人來到漢地與僧受大戒一名支法領二名支謙三名竺法護四名竺道生五名支婁識其時大律未有支法領口誦出戒本一卷羯磨一卷在此流行至魏初邵陵厲公嘉平三年有中天竺沙門曇磨迦羅此云法時善誦諸部毗尼至雒陽立羯磨受法準用十僧於是佛法大行震旦為東夏受戒律之始也後至前秦建元二年天竺沙門曇磨持此云法海譯出十誦戒本三部建元十四年竺法念譯出毗奈耶律十卷後秦姚興弘始十年天竺尊者卑摩羅叉此云無垢眼來遊關左闡揚毗尼鳩摩羅什所譯十誦律大行者叉之力也弘始十一年有中天竺佛陀耶舍尊者至譯出四分律藏而關中先行僧祗江南盛行十誦至元魏法聰律師始弘四分律宗聰傳道覆覆傳惠光光傳雲暉願願傳隱樂洪雲雲傳洪尊尊傳智首首傳道宣宣傳法勵滿意意傳法成成傳大亮道省亮傳雲一道岸惠澄澄傳惠欽皆口相授受臻於壼奧自此之後廣矣詳載高僧傳中至宋元已來代不乏人元末明初戒律稍異明中諳律者已希至明末時律之一宗掃地矣余從受具來閲大律藏目不交睫者數年而不得其中宗趣遂遍參諸方以求明哲而無一習學毗尼者經云毗尼藏是佛法壽命毗尼藏住佛法亦住余慮法不久住晝夜悲傷不能自安時余年三十有四興往天竺之念求請梵僧數人還歸震旦再傳戒法俾戒燈熄而更著壽命微而復續遂于甲申春抵閩地欲取海舶人夫從閩濱約泛一載餘至東天竺海隅耽摩立底國可六十餘驛到中天竺那爛陀寺不意時值滄桑弗果所願至今年過古稀猶悵昔之無緣也比見諸方叢席與人授戒不依佛制盡是非法別衆非法者何不知白四羯磨惟抄寫他人杜撰閒文唱誦或師自心所作佛制受具者至多惟許三人同壇若過即成非法縱依羯磨而誦文生澀事多舛謬尚是非法況杜撰者乎別衆者何不知依律結大界及戒場既無戒場即一人受具同住比丘或百或千盡要共集與彼授具有一比丘不集是名別衆衆既獲罪受者亦不得戒而終身得假名比丘虛受信施公然自謂上座受他禮拜罪莫大焉或在白衣沙彌前作羯磨三十二十同時一齊授之大違佛制若不依佛言教何名從佛口生從法化生世無二佛法無二制斯則非法為法以訛傳訛遞相踵習不覺其非誠為末法之滅法矣然此則關係法門非小若有如法受得戒者自當保重如護明珠其住持弘紹之賓特宜遵木叉之教依法依律依佛所制俾戒珠朗于長夜木叉固而永久是為弘正法傳教之大士焉授比丘尼戒録序式叉摩那戒録序文多不録壇者即是戒場在大界內結大小法式如標釋如釋所明刻二教論序教鼎列三中古襲之矣今論為二者非彌天之辨莫能擬議焉其法條分十二明九流洞百氏道歸儒宗釋超六合教羅三諦理極離微故不可得而思議唯通方先生獨發千古之幽覆楷定萬世之司南捨此孰能賾其少分哉讀是論者須俯空涯涘之見始可覷尾閭之汪洋歟刻通極論序夫佛理至極非達士通人莫能底之而九流百氏各泥教跡競生異端是由不知一真靈覺終古無泯強立名言妄談氣生氣化見封世典遂疑貝葉之非理執域中故昧出世之妙未睹梵行先生何識古皇法化是論之由作也破世術絶競流比月指類耀拳讀者須虛其心空其見腳跟不帶纖塵自然踏翻窠臼始不孤是作又何虛是刻哉二論出廣弘明集心經添足序如來出世本為衆生發明心地然心無跡難以形容不已於虛空中畫出一條鱉鼻蛇首尾宛然可觀而不可觸今不自量為蛇添足得無取笑於人乎咦蓋欲令人識足知蛇如標月指讀是解者見蛇遺足得意忘蛇方為善用其智且不咳余如或不然未免毒氣所中切忌切忌歸戒要集序夫三寶者性相常住體周法界接物應機如日曜於千江為世舟航非三畏之可比故其始心入道首則歸依三寶受不殺盜淫妄酒戒似儒教仁義禮智信之五常然五常慶在一生五戒功歸多劫故云五戒不持人天路絶如來三十二相皆從持戒而得苟不持戒尚不得疥癩野干之身況得如來功德之體若能持戒現獲名稱終超有頂是故現見奉戒去殺不徇仁而仁自著持戒離盜不崇義而義自敷守戒除淫不修禮而禮自立遵戒息妄不期信而信自成受戒斷酒不履智而智自明夫斯之實可謂振網持綱萬目開張破無明殼出長夜夢復何功可以加之何德可以配之若不是修昧於所欲徒役慮於名形勞心緣於百氏倦形神於宵夜虛耳目於良晨何乖道之遠逝而弗及者乎得其本則無欲而不辦去其實則何從以措心是以梵忠捨異學而歸投三尊菩薩奉禁戒而位同大覺如斯之教孰得而思議哉刻地獄生天記序湛然禪師接曹洞之正脈為一代宗匠探賾三藏尤善華嚴得遊戲三昧於藏經中拈出漁翁一段公案織為戲文目曰地獄生天記至於屠沽往生不無所本或曰梨園歌舞沙門亦預言乎曰華嚴五地百工技藝靡不綜練故諸大士以六度萬行利生見有一法益於世者即為之舉示然則湛公於華嚴海中興波作浪就場屋裏哨月嗏雲又何疑哉梵行比丘弘戒得本欣然捐衣鉢資重梓屬余為語余喜曰是亦藏海之一渤歟用筆諸簡端刻金剛經後序我釋迦如來一代說法隨機大小教分十二而為八萬四千修多羅藏今此金剛一經乃六百般若之精要八萬四千之力用如金剛王寶杵擬山山摧擬空空碎破一微塵出大千經卷而無一字可得安一切衆生於無餘涅槃而無涅槃之相橫揮直抹妙用無方不可得而思議者故空生歎之莫及曰希有世尊今梁子某睹是希有弗覺展眉擊節用剞劂以流通俾受持讀誦者應無所住而契無餘涅槃是則梁子誠為荷擔如來矣山僧由是歎而莫及故特表而出之壽孩若何司馬八十一序器界中有閒賢散聖灑然物役之外蕩乎寥廓之間其道以不壞色身為最勝所謂壽者相也故得其道者則年與世異雖造化不能以一多數限之若彭子之八百東方氏之三千此猶未達其源也比世之人多徒慕其年之修永而不思厥德修之當鑒是烏能善其道者哉唯孩翁老居士則不爾居士妙齡以詩書攻品器中歲以劍術濟時用晚臘以善根學菩提而溫恭明厚恥宣人短好行惠施不自有其德以為天性之致然喜放生戒宰殺刷竺墳老典以流通延法侶而轉金剛藏口持無量壽之洪名心蘊無量壽之萬德則又其篤誠時事也夫以居士生奕世文學之家而善韜其矯傑安於積代豪富而樂志淡如非其心冥至道蹟高閒賢散聖者又孰能與於是哉則其享不老之遐年固不可以八百三千齊限矣居士常訓二英孫曰古先達名賢多從三寶門中乘大福而轉身者如李鄴侯呂申公其人也爾曹當亦幸自勉今二英孫弱冠已著聲泮水他日定應木天石渠之選而酬志於野院山門知復留玉為鎮矣茲乙巳夷則朔越之日乃居士九九懸弧之辰諸釋氏子嘉居士行邁前哲履道幽玄實今之龐老子特欲得山僧一言為慶祝山僧愧無繡口不足以揚令德爰念與居士數十年莫逆是不敢以疏拙辭者乃為之頌曰有隱君子兮河之濱與世相違兮道是循佛是吾師兮僧是親性嘉仁施兮每出俸而活羽鱗誘蘭孫以修福慧兮指般若而為津都無閒心於逆順兮安得有喜瞋今則歷年已九九兮貌如童之誾誾問渠何因而致斯兮知己久證金剛身吸西江于一口兮曾不動兩脣出瓶鵝而不雙損兮自諾何須人聞桂吹而無隱爾兮觸鼻皆春題程君縉居士浣月軒月為煙雲霞霧修羅五事所翳不得明淨人被色聲香味觸五欲所迷不見自心良可慨哉今君縉居士負英標豪邁之資出歷宦途五欲自恣而不昧晚歲歸心道法構靜軒開月池以自娛余因題浣月而贈之蓋擬一入此軒者塵垢廓清心月宛然呈現矣雖然如是猶須好著金剛正眼始得刻博山無異老和尚廣録後序拈花微笑靈山父子無事生端斷臂安心少室師徒一期特地然而別通線路曲為今時所以總屬葛藤怪由昔日矣我博山先師翁無異老和尚因邪打正翻古案一千七條逐浪隨波承洞宗三十二葉憫時救敝滿空法施棘蓬誘素規緇遍界聲撾毒鼓三十餘年落草幾翻徹底為人故當時喪命根于辣鎚下者紀不可勝即今分法化于震旦中者數難枚舉惟我兩雪和尚不出戶庭隆興家業可謂嚴提祖令克振芳猷歟茲澗法叔彙集師翁所遺葛藤公布諸方永為法乳屬余分任冀早奏功俾他時有超宗異目者于師翁言句上覿睹尊堂踏翻玄路使瑞苗蕃茂播宗風于無窮貴胤彌昌逆洞流於不竭是為跋刻十七帖序世間字書竟俗而非僧也僧或間而為之乃率其自然非攻之也而或攻之至於花卉丹青是俗竟非僧也豫於方外得右軍十七帖觀其墨蹟化而龍也由是藏之三十餘載今欲以其神化布於天下因而鐫之俾不沒其胸襟千古洋洋焉好生集序夫血氣之屬莫不稟天命而成殊形異族俱託四大而有所謂天地同根萬物同體根體不殊故性是一所以希生怖死痛癢苦樂曾無有二豈可割彼身命益自幻形一針刺體苦楚難當半甲離皮痛徹骨髓何忍釘貫頂門刀刎喉咽生剝毛鱗活就湯火痛心未絶已上刀砧假其苦痛異人則任烹任割苟或無殊便當縱躍縱翻回萬物於己體推性命於天地物我一如自他無閒返本之道誠在斯焉所以莊子得物之逍遙孟氏懸符於悲體湯君解網素王不綱是亦戒殺之漸然終媒乎其本故孔門目之為權漸釋宗稱之為頓乘乘頓則縕乎權漸未有執漸而廢其頓又況權漸之不為安稱仁人之心哉忽此心者猩鷹何異且因果皎然響應無爽影逐形遷業隨作受未見植麻得粟殺生而獲延年果報不殊致有修短之別放生自感福壽無患少病皆其餘祉故劉之亨放雙鯉而得延年陳元植護生命壽增百歲楊序生活魚子得越中夭採樵夫救焚山生梵天壽過一劫天帝釋護鳥卵而戰退修羅韋丹老贖烹黿報以祿位楊寶童療病雀得玉環四世三公李進勍放一船魚度厄獲金釋真表棄畋獵彌勒親與授戒永明壽空庫錢而贖生命德大道成隋天台建陂池魚盡生高麗流水長者救十千魚俱生天上報以珍寶位至成佛即我釋迦如來也自古聖賢無不好生愍死不畏後世乃為殘戮只圖現滋三寸舌根不顧怨結萬代世世生生於六道中伺相酬報相害相吞至有兵戈劫亂業果未盡復造新殃如輪環轉無有休息如來愍此教令斷殺放生使因不作果報自泯其有智者頓悟同體一旦捨之則慈施天下十方剎土悉自安鄉三界內外皆我樂國啓諸仁德淨信佛子共欣斯旨遵修慈行贖放毛鱗縱其飲啄使逍遙於雲漢之間任優游於湖澤之內或聞法以脫輪回或承咒而生天上同立仁壽之基齊罷干戈之響回舜日於當時扇慈風於斯際願既不減于天台功奚異於流水殊因妙果豈可得而思議哉祭文掃雲棲大師塔文如來滅度千年至漢明大法始流東夏于時宗奉者不少而歸根得旨者誠希自晉東林遠公振起馬鳴龍樹之風道高德隆一時緇素名賢翕然趨附猶百川之趍大海洋洋乎誠一代之慈航矣迄今末法人訛口口談空而行在有中識想紛飛滿胸三毒非極樂為寓言詆念佛為下根嗚呼衆生之福薄至於此耶唯我雲棲師翁老和尚愍彼狂愚中興淨土豈但繼東林而實代佛宣揚於末世矣某自愧生晚不獲師翁慈顏一面一言以示獨於三十四年時趨赴窣堵波下得藉三禮茲欲再親禮支提而恨年已衰邁摳趍不前乃特遣侍者某齎辦香酌清泉捶胸三禮曰佛愍群蒙膺生死苦故開方便持名徑路助佛獎化永明壽祖禪淨雙持猶添角虎師翁同手彈琶弄鼓接引三根競升淨土心無垢染孰知濁污一念不生凡聖皆倒堵波巍巍天龍歸護誰識師翁為人末著古佛現身非凡測度生平說法救病良藥如昔文殊親示無著普賢曾授善財願躍念佛一門度世慈舶天上天下師為獨尊狂瀾砥柱人皆仰欽隨緣示化薄福寧親衣鉢久失憑誰示珍再乘願輪度盡迷津緬師高風千古一人和南尚饗掃壽昌太師翁大和尚塔文維某年某月某日前住端州鼎湖山近居南海寶象林法曾孫某敬具清香素饌上供太師翁大和尚窣堵坡前曰先瀛山曩在祖庭上堂曾對衆舉揚傅大士空手把鋤頭究竟成何事業我師祖則一生腳踏實地惟把箇沒柄鉏頭第一鉏翻起三大古名剎第二鉏掘開大地人腦門復云欲識傅大士後身麼則我師祖是欲識師祖前身麼則傅大士是今日不肖某安敢揭父攘羊秪圖證龜成鱉何故傅大士當時一鉏不了帶纍太師翁太師翁當時亦有一鉏不了帶纍先瀛山先瀛山不為不盡力但爭奈鉏不完如今少不免向太師翁窣堵坡前痛下一掘以了此不完之鉏伏惟太師翁忍默不呵且作麼生是不完底那一鉏直斷諸佛祖命根太師翁也須好生回護於是稽首作禮而言曰禪林下衰宗風怠弱至明季間殆為極矣嗚呼倘不藉太師翁乘大願輪再來西竺古佛出妙手眼振起揚廣家風則洞上一宗幾乎將墜其為功也何非接懸崖之樹蔭覆天下人哉若夫高抽寶鏡君臣五位以齊彰平舉蓋函賓主三玄而貫徹權衡佛祖規範人天此皆太師翁餘事也只如太師翁生平一段風流灑脫處且又如何冒雨衝風去披星戴月歸交互明中暗覿面示全提伏惟尚饗掃博山異老和尚塔文鼎湖法孫某自惟生晚不睹師翁雷舌親宣中興洞宗之祖道乃於三十四年時踏到窣堵坡邊三禮而白雪三墮時不自揣猶恨弗獲師翁一面一言以示遂迷頭狂走雖然歷盡諸方至今猶寒徹膽髓毛骨凜然寧知師翁當時全身獨露聲振三千為我徹困不淺而我於制底前錯過不少矣嗣後弗覺絡索因循光陰幾許不獲再趨德相展謁罪犯難逃過非空界所能容也今澗法叔仔肩法門欲使法旨彌綸宇宙以師翁遺言集成部帙熱腔授我重梓入藏為人天之眼目續萬代之心燈某拜而捧之不啻寶鏡親承合指微諾今特遣職事某稽首師翁窣堵坡下伏愧劣孫脣不似驢腹不類馬無空王膳如妙高聚既不用鹽醬那希胡餅唯以法界為盤羅列森羅萬象翠竹黃花於窣堵坡前鼓沒絃琴吹無孔笛擊半邊板歌明月調供上毗盧殿裏赤體老師翁異大和尚惟願揚眉謦咳俯鑒微誠尚饗上瀛山雪和尚塔供忱靈峰一會惟大龜氏能契真機洞上一宗非我和尚莫續其焰恭惟和尚猊座妙齡拔俗穎悟天成親先師翁提命三十餘載大臻圓奧足不越閫而首衆博山由是法化兩江道震天下某丁丑春於杭之接待寺獲依座下復於橫山光明古剎忝同室處雖惟自愧不識師之婆心而師之面目亦瞞某甲不得時為業風飄墮瘴鄉不復再侍巾瓶緬想真容深恨水影茲特將丹忱稽首窣堵坡前爇瓣香酌清流物雖芹微赤心遍界詞慚石女淚灑天風伏願和尚常寂光中無靳昭鑒上鼎湖棲老和尚供忱順治戊戌八月七七之晨弟子某謹備瓣香蔬筵敬奠于鼎湖堂上圓寂老和尚猊座前曰嗚呼師於空王佛所乘大願輪遊戲法界出沒娑婆欲誘群蒙而示現有生託質同凡而妙齡出俗度嶺遍參杖履南浙聽貝葉而性相宗洞徹晉雲棲而受惟心妙訣撞趙州門入博山室遭其毒手命根頓絶歸自蒲澗翻貝多而教羅三諦坐白雲而範圍大千播惟心鼓毒殺活全提無容擬議某夙緣感至得禮座下自愧皮頑膚厚不納風薰狂心未了踏遍諸方雖逢哲匠無奈櫟根終非良楮擬欲歸來再侍巾瓶還拳丈室不意師厭末世遽遊寂滅大海使我銜哀望斷淚似雨傾肝腸痛絶踰於喪親法幢斯倒四衆失怙角虎潛蹤孰為哮吼惟冀電光再掣影落千江任其撈漉縱彼欣觀覷破則頓悟無生踏著則同歸性海圓師悲智滿師願輪和南尚饗祭華首空隱大師文維順治辛丑歲迦提月十一日鼎湖山法姪某謹遣副寺某化城監院某知客某侍者某敬以香燭茗果致奠于華首和尚空大師之靈曰於戲日月逝矣詎弗云來法幢已折良可痛哉將謂泰山而無其頽今遽失仰云胡不哀緬維大師天縱寧馨靈根智種發自妙齡才方剃落即志上乘曉夜翹勤脅祖斯型依吾和尚受二華經同居白雲切磨咨傲頃嚮攜提參老博山遭渠毒手簇破生顏鐵虎蛇吞須彌坑陷首羅哭救血淚濺濺師從脫露遁跡投間于彼黃岩重坐死關星霜頻易饑寒頓忘妖松不燒銜花亦荒心冥境蕩卉木騰光福智資糧咸是齊彰德光行勝龍鬼推將出而範世賴振宗綱鑄陶衲子誘發冠裳剛柔赫著遙邁石霜粵鄉閩地法浸汪洋顧我胡為宿緣蹇甚先師歸寂未三五稔恨猶未剪孤零可噤方切瞻依冀渥露潤而忽訃聞使我心燼哲人違世一何其迅嗚呼慧日潛輝黑風怒號魔邪方熾龍泉反韜花鬘失貫牛耳誰操禪林無幸耆艾凋槁凡我緇素孰不為忉未了無生寧契師旨師視涅槃無異生死生死涅槃如夢如翳大寂滅海為師遊戲聊存世禮薄薦蘋儀尚饗祭博山雪澗和尚文維康熙十年歲次辛亥某月某日粵東南海寶象林瑞塔禪院法姪某甲謹遣行者某等齎瓣香清稽首敬上啓於博山澗翁法叔大和尚常寂光中曰洞上一宗幾將墜而復振者誠藉我老法叔大人為之扶豎也自壽昌老祖脫聖凡窠沒三乘見以那伽力挽頽風於當時翻身拶入魔界硬操犁耙耕開彌天險阱於時被生陷者不少喪身者無數唯我博山先師翁素稱手眼而親陷徹底通身糜爛氣薰遍界是以三十餘年抱冤難雪適遇我瀛山老和尚久侍師翁巾瓶親得其旨晏坐萬仞峰頭直下騰身受用不淺故繼席二十餘載唯於荊棘叢中拈出一條爛刺待人接物務求其知痛癢者以為大法之寄適年高臘長德望方隆為一時四衆人天所仰乃忽唱還鄉之曲遊戲於無住大寂場中而法運下衰憑誰砥柱姪於三千里外聞之不禁臨風淚墮因展哀衷曰嗚呼法門秋晚邪濁混流清珠云失孰任其憂緬維老叔慧深德稠溫粹其容空正其眸毀譽不關如彼崇丘以德感人人皆自投微言辣語真世慈舟生死涅槃如夢如漚臨行飄然自怡自由示同能仁八十春秋千古高風誰敢與儔唯口生子長踞哮吼千里微誠薦茲茗甌寂光不移靈鑒遍周槃談尚饗祭蘆田穎學大師文維康熙癸丑六月朔越十四日法弟某因瀛山人來得聞穎老法兄大師圓寂深痛法門之不幸也敬具清茗粗蔬遙空和南致奠曰始余行腳撞入妙行睹千人叢兄為氣豪知堪種草非凡羽毛於先師門久受薰淘余慚鈍劣空負同條兄常勉余整翮南翱及余歸嶺送我輕舠舟中衷言徹曉叨叨分攜之後山川寂寥余既陸沉兄亦光韜庚子一書聊敘鬱陶擬完拙圖話炎颼豈謂一旦示我難遭法門無幸憂心孔勞緬惟法兄德高臘長面忽云徂後昆誰仰生平一味孤嚴厚養克振先型爰成碩望諸方咸推人天哲匠而兄竟然不輕拈杖惟具眼人賞其高唱方諸賣弄何啻霄壤如今太息縱橫魍魎白澤不存孰為袪蕩千載音容徒令懷想我薦茗蔬不殃鹽醬地陷紅輪海底燈亮尚饗祭公孺陳山主文維康熙癸丑年五月望越二日寶象林沙門釋某遣副院侍者謹以茗果蔬飯香燭錢帛致奠於開山火檀越公孺陳老居士之靈曰言夫公之出世當萬曆之戊申沒於康熙癸丑五月五夜將寅得年六十有六可與古稀而同論吁壽固惟公宜有兮又孰知夫有德而始臻洎自弱齡即負奇氣兮睨視富貴等浮雲任豪俠而不淫蕩兮率曠達士之天真性耿介而不黨偏兮敦直道乎鄉鄰行從儉而非固兮名為實賓而薄徇乃若令尹之與冏卿兮結為子女之婚姻人不多公之千箱萬倉兮而惟羡公之蘭裔振振況公之暮年猛省兮亟尋苦海之通津歸大覺而執弟子兮願修真以脫回輪謀余建剎而捨地兮期與人天樹福因今人見聞是美舉兮莫不爭並亞仙而稱陳茲既禪林之落成兮擬披緇以違世塵不謂心真而身幻兮遽把黃粱付缺伸嗚呼世之人代公猶恨有遺餘獨我知公往已升化樂居由公崇功德千載堪歎譽吁人生如寄孰不歸歟公歸得所誰無仰諸蓋公所未了知者生死即涅槃煩惱即真如然吾今日徹困為公也眉毛豈復能惜於微塵國土不隔毫端兮心佛衆生誰親疏十世古今不離當念兮芥石徒然何終初於斯薦取莫躊蹰菩提目前湛碧虛欲識此中無隱意清茶清果間清蔬薄言申奠惟神鑒且尚饗祭高要王邑侯文嗚呼世間萬法遷變無常所以此身喻如輕霜三萬光陰殊非久長有生必滅孰能免將惟達道人生死兩忘緬維居士天性溫良器識恢宏愷悌慈庠以金吾長出蒞蠻邦救癆瘵民傾菩薩腸惠政方成口碑道旁恨才未展如漢龔黃我隨世人為斯感傷賢人早歿君子道荒況公願輪為法金湯倏焉告逝誰繼優光我本期公大潤遐方宰官說法普施慈航云胡中折失豫良望嗚呼愁雲慘淡東風颯吹草木雖榮終至必衰哲人已往不復見之德音千古式動人悲我念與公道心相知公亦愛我法語相資聊酌杯水弔清白遺惟靈高蹈西方寶池嗚呼尚饗祭空白禪師偈生來八十齊能事皆已備不學祖師禪唯持殺活機殺盡歌太平掉臂歸來去不住彼此岸橫身臥太虛舉火為崇梵闍黎舉火般若如大火聚四面不可入般若如清涼池四面皆可入大衆者闍黎梵行已立所作已辦亙古亙今唯此一人其來也月落波心了無實體可得其去也鴈過長空亦無蹤跡可留以不壞假名有此幻軀今欲赤手露其娘生面目故有茶毗之舉師秉火苣云此苣若喚作火則無安身處若不喚作火則無立命處畢竟喚作箇甚麼若出得此中句盡十方界是箇常寂光土即以苣打圓相云者裏便是四色蓮花擲下苣云者箇就是金剛不壞軀為鐵橈比丘舉火鐵橈具壽汝六十餘年來在俗是箇儒家君子出家是箇梵行比丘今日脫體無依既非俗而復非僧畢竟是箇甚麼人噫佛祖不能命其名五眼焉能窺其體會麼你若薦得生死當下了卻若也未會我以此靈苣送你往西方極樂世界彌陀為你說破音釋涘音詞上聲水涯也咳音孩笑也德相即塔也謂衆德所聚之相也槃談即和南華言禮敬飆音標暴風從下而上也睨音詣邪視也韜音叨藏也寬也舠音刀小船三德若分言之法身般若解脫名三常淨我樂名德那伽大禪定也弟子一伎等捐資敬梓剩稿第四卷早獲正法眼藏頓悟如來心印度盡一切衆生然後成無上覺康熙甲子仲春吉旦識弟子正童奉資敬刊剩稿第五卷三障頓消四智早圓與諸衆生同成正覺康熙甲子中秋吉旦識泥曰亦云泥洹又云涅槃此云不生不滅鬻音欲賣也贋音雁僞物矱音穫度也嚮音向不久也
