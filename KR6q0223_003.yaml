body:
  text: 侍者開溈録尺牘與竺菴和尚獅絃朗奏妖籟沉音洞風方慶其大揚矣遙空作讚固已多時而別峰相見又昕曛不隔纖毫也不慧自方外回即僻居荒隅不與世接者幾十年來近為鼎湖先師歸寂衆乃苦勸住持然每愧樗櫟非材秪堪鈍置窮谷無何勉強從事正藉德光遐映耳茲洞禪人回特修片札奉候興居并拙注塵覽不盡與石塔梅逢和尚瑞應優曇普天欽仰老兄握夜明符出世適當其時弟嚮往高風已非一日獨未覿面遘談覺慳良緣耳然松風水月又不可謂有纖塵之隔剎那之異也所愧弟因方外回鈍煨瘴麓無能為洞宗出指殊自嫌面目今則撑護有人弟何嘗而不謦咳揚眉哉茲因洞禪人回特勒八行訊候尚容親圖握敘為一期傾倒也與檀度南菴和尚深山大澤必産龍蛇信乎古言之不謬也我博山師翁以行解相高為中興曹洞之尊宿三十餘年不捨鉗鎚當時英傑所從出者則瀛山先師與令師法叔數人堪稱大澤中真那伽子而令師道德才品俱勝又得法兄光紹前烈實令人謦咳彈指也仰惟法兄再來大士正好於斯法衰魔盛時大出手眼振作一番俾佛日晦而重輝吾宗微而更著則人天俱賴有津梁焉客春澗法叔以刻師翁廣録與謀因寄有法兄大集披覽間頓見口光徹照益信再來大士乘時演化以救今之訛弊也弟欽羡又何如哉茲因鴻便率勒數行一通高山流水之意臨楮無任馳戀不宣與位中和尚禪林下衰如今日撑拄正須過量大人法兄從般若中來為法門上將具見聞根者孰不景仰而加讚乎弟駑駘鈍鳥不能有所振奮甚自愧虛負圓顱所幸三十餘年前隨人行腳獲親近東山令師叔及二三古尊宿見其作略為人誠堪可師獨是碌碌庸材終以活埋為得計若高視法兄權衡佛祖舟楫人天自又應捶罵不少矣客春因澗老叔遣侍者通信曾著行人隨還擬順走寶山謁候適值老叔圓寂行人急欲回報其書并土物送附博山轉致不知曾達記室與否茲復付博山一菴書并儀物走敬法座想老法兄清風朗月之懷必頷之一笑也臨楮無任依依與程周量方伯居士坐菩薩乘現宰官身凡在法門皆藉弘護可謂不忘靈鷲付囑矣曩者于分衛中得一接晤具見道意汪洋令人欽羡無已別後想慧眼廓佛祖之心宗造履極聖賢之物格不假聞樨而頓明無隱直掀翻維摩老子信然也俟他日有緣當親訓姓稱官人一喝茲因便鴻率勒寸楮奉訊興居萬福隨附拙注呈覽臨楮不盡神飛與黎常谷文學相隔三秋猶之一日誠為白駒過隙生死迅速得無令人著忙者乎比來興居想獲清勝但未審道念有所進步否苟不日新難以中立則後必有退踵日在如此皆由不信自靈明之不昧死復更生之定理因果影響鷺白烏玄必無爽也今貧道為緇白二衆苦延住持鼎湖日欲居士昆季到此林泉一話或能觸發宿因覷破娘生面孔不惟慶快一生而亦喜於千劫不為生死纍也與楊無見居士出家號石鑒前日過館飽我香飯至今八萬四千毛竅中尤作衆香界氣息但愧空腹沙門無可為報耳感愧感謝惡濁世中尊翁能知歸向法門請余與授歸戒萬中無一他日定為樂邦中人居士亦應牢把鼻巴於市廛街頭伸腳千魔無能嬈八風莫能搖始不虛在妙喜國中來作有家漢子也與宗符比丘老人昨在勇猛菴住二十餘日見菴衆有學律者而不專志志苟不專則難以融會持犯未免有觸途成滯之艱久之便有隨流日子去矣復見有學禪者皆墮今時知見多輕毗尼咳詆律學以為執著寧知輕詆毗尼叛逆聖教而執病尤甚縱遇藥王大士扁鵲神醫亦無下手處也古人咳唾掉臂無非妙用何獨毗尼而非妙用乎斯則不但不知古人受用而且不達如來聖智何也如來在昔不以正法眼藏付囑彌勒文殊而付囑大迦葉尊者尊者位居聲聞頭陀終身午前不雜餘食過中不飲果漿古板子無過此老今奚取此老心而棄此老行耶嗚呼如來婆心專為末代作箇對治陶鎔習氣榜子而末代專與如來作箇諍門殊不知隨自習氣阿誰不會何俗不曉如此豈特為習氣所使實自失大利益復於末世中作箇斷滅正法種子自誤誤他過非小也昔日親和尚嘗曰一善知識出世即壞一正法又寧知度一徒出家便壞一正法乎故老人長夜懼此所以不敢廣納徒衆恐力誨之不及教之不全即為獅子身中蟲矣子昔依老人住十餘年老人未嘗有不遵禪律而互相詆毀者吾初勉子參方仍贈以草鞋錢衣襲等物可謂欲子成人至矣子於嶺外得遇羅峰和尚禪律教三宗並行是再來古德也和尚後住日親山你復得親侍數載受益不淺奚可不奉日親之教以教徒衆返順近世之徐六可乎當自勉之與嚴石行文學聞居士去冬為魔所妒然今世界舉目皆然能不被他困者指不數屈惟堅自定力力行善款信因果之無誕則惡魔不能致其大禍況者段公案乃居士多生與他結得來所以今生未免纍及茲魔既自衄獲太吉利即是消除宿業勿造新殃是所深願也復何壬生明經三教之為言也不離心性心性之言雖同而道迥異何也孔老之為道志在一生忽三世之論昧因果之談故其道落斷常性窒六合既窒六合塵不可出區區于寰宇之內輪轉六趣之中由斷則迷善惡之因而不知響應是以難免當來有為之果果復造因因果循環生死不已由常則堅執世間有為之法而不達無常雖有逝川之歎而無不滅之論吾佛所謂道者性自如如本既不生今亦不滅而教則離名言絶數量無大小彌綸六合之局論大則圓包法界言小則細入鄰虛湛然常住而不變不遷寂寞虛靈而不迷不昧歷今古而無去無來即一念而周三世無凡聖之分越心識之見尚不得以有無而為論豈可以斷常而為言若佛所言有無者以衆生一念不覺自作妄因妄受果報如影隨形猶響應聲理之必然毫不有爽果成因謝果謝因無本不有因妄造而受妄無實性故説為無因果不亡故説為有此吾佛之謂有無非同孔老之有無若有信生死因果不虛自性靈明不滅者於上言句檢點明白則不妄作妄受妄流生死可於二六時中恆自返照看自現前一念落在何處忽也窺破則不隨其生死流轉而大事辦矣然初心入道必以福善為門不妨多種以為助道之因故云修慧不修福入道多辛苦是知入道福高易進善淺難成賓頭盧令釋道安浴僧誠為可鑒紙墨難窮太虛理名言豈露佛祖心請自酌量惟善觀察復洪西嚴少宰世出世法本一無二於諸有為無為法了達其性則是行於出世法不了達其性則是流於世諦法故有動涉有為而不昧無為者亦有靜向無為而轉涉有為者明昧之間雖毫釐無差實天地懸隔言之誠未易易接教知已稟受菩薩大戒與決意林泉幹辦出世業去事之佳勝孰有過此窮巖棲苴愧無稱賀謹達斯言是用遠將想高明諦理不以為贅談也又別後每懷尊體想今調適矣曾覺病來有所得力否凡入一番紅爐必有一番銷落便中幸詳舉似在今相與不敢流於世諦向言有所未直者以奉法於君子之信而後諫今既不鄙寡德資受佛戒不信之疑毋容在念當必忠告惟是懸説多端不知應病一語故索來教俟有嗣陳明教嵩公之言曰為道不為身為法不為名實竊膺之倘能成就舒我老婆心以報佛恩曷勝感藉復曾自昭文學出家號更見自禁足沙灣時詢鍾山諸子及往來僧衆知居士關中兀坐晏然自若深懷慶慰第未審腳跟下事若何措足茲接來札頓見心目矣然向上一事既非識見所到亦非理會能及若於言下薦得乃是宿具靈根才一用心便落工夫邊事即須猛著精彩把定在前看渠渠是誰步步立在轉處不可死在一路自然抵至也縱使熟境雜念現前如電掣長空紅爐片雪不用將心掃除自然去不留迹苟以心除心心心相續妄無休日猶如病目惡見空花花轉非一一念回光空花自滅雖云心本無二而用之非一故致每多墮歧途然根有大小性具剛柔做工夫人誠有緩急若英雄憤發之漢舉起當下即要決了如人捉賊當前扭住立目便要見贓又如猛將入陳以擒賊帥為心雖千鋒萬刃交途而單刀直入無暇顧其餘者話頭現前尚不見真何得見妄所謂直取無上菩提一切是非莫管斯乃超群拔萃禪和子之捷徑工夫倘才見妄生即是念不專一工夫不得力矣其根性柔者久參疑情不破心無間歇工夫由是綿密異念不生切不可認此為是只當發起勇猛以破疑情為志自然有觸著磕著日在倏爾靜境現前身心輕安見靜裸裸地斯乃識情澄凝所至心境暫寂非是聖證若作聖解即墮群邪若能於中急著眼睛忽然覿面則虛空粉碎大地平沉方為撒手若英雄憤發無箇入手處正是大路當前不可暫歇脫有廓然即當遍參知識以求證驗得遇作家手眼方有竿頭進步最怕自認電光亦忌他冬瓜印子今觀來札知近日所得不出妄心暫歇正當發起疑情勇往向前自有一番大受用在他日始不被天下老和尚舌頭瞞老人於居士心熱不覺率此逗漏為鄰人作醜與我一皆抹卻為幸復黎哲斯居士欲以世間法而求出生死者其猶形曲而覓影端聲暴而求響順寧得有之乎言脫離思想無箇覓處即當看此想從何處起去至何所復覓不得可看此想面孔何似倘或窺破可來與老人驗過萬不能下此工夫因果不可不信齋戒不可不勤三寶是良福田不可不深加歸敬佛是世間慈父念衆生如一子若人想念佛名如來即入其人想中是則以此思想妄念易之而為佛心佛心既成則不隨其世間生死流轉矣復伍鐵山兵憲香山縣古名鐵城鐵城湖峰山川雖阻而雲月是同猶影現澄潭兩兩相接非遠非近非一非二既無二月必無二人故判袂來寒暑疊遷而未嘗與老居士纖隔邇來懸念之思水月未足為喻想居士亦必然也承惠墨丹佳章四壁為之生光非月裏兔毫神力變化莫能有斯也復嚴定生居士貧道母難之晨自惟無德可報好慚好愧乃纍居士偈言見祝直得繩床震動來云是箇爐鉗未卜向甚麼處安炭火咄無你棲泊處西照禪人來意得恁麼孝順寄與三十棒著定生領過偈曰間搦龜毛筆繪出虛空樣博得居士嚴謂豫真拙匠居士若誠然如群盲摸象居士若不然月非離指上説似即不中獨許衡山讓當鋒毒棒馳問渠誰痛癢立要斯石人打翻奇伎倆白日嚴公眼莫自生花障知我不相瞞斯為真供養拈卻金剛經何有相非相直下欠承當知復沉比量來云我聞般若經壽者本無相復劉璞公文學貧道擬樹白石浮圖用報佛恩已經歲未竣比昔賢插莖草而寶王剎成似尤省事居士旁視應失笑我也兩承捐助福自有歸須知當前了無受者勿責無禮沙門不致謝也來諭不斷煩惱而入涅槃是則直捷之甚但不斷淫怒癡亦不與俱於此又覺反案未審居士曾酌量與否世諦浮蝣行陰不駐惟居士如時自愛也復何見五司寇人生世間須憑福力所滋時逢末劫不假善因曷獲祥臻之果然福從善生善由心發是以日用中須善用心才有毫芒不與道德相應者即須揭除無至萌生漸長不覺滋茂難钁其根言不相應者首則殺生次則驕恣不念人身無常三界火宅目前所有悉屬空花智眼靜夜觀來於己毫無分在惟有生平所造美惡兩業雖千生萬劫亦不系亡是故智人須擇其善者而力行之斯是善用其心者也如居士昔處驚濤大獲晏然莫不皆由宿之良因今之善德而至也茲聞齋戒無倦信念愈堅非具智眼看破空花無能如斯更能百尺竿頭再進是為盡善盡美道人老病日至明春決罷剞劂之緣還山與泉石同優以待天年耳後與居士晤話難期故以婆言訂及幸無嫌瀆可也復徐聖甫明經真幻虛實已知居士知之世出世間諸法亦已知居士知之然於知之而未曾勘破是衲之所知之衲所如之久已啓之唯能啓之不能為居士肩之故歷劫塵勞擔子還須自己回頭一看廓爾放下即千生萬劫夢事了不可得當處即見古佛解脫場矣如或不然則未審擔至何日云休信知知之一字衆禍之門也復李仲藏文學面後滿想居士工夫日有所進不料為地水火風四大所滯然病生起必由於心而心非四大雖非四大亦不離四大苟能於斯言下窺著不但病無處所而維摩老人亦被居士勘破矣復劉中雷司李昨與居士一語相投非百劫千生之緣無能有此茲來偈語猶是途路邊事道人意欲居士不涉程途當處家鄉乃不廢力是真不打之繞者若也不然猶費草鞋錢在昨癡心相為不得已向居士嘔臭糟水為我一皆瀉卻為妙既知是無明本自設欄頭板是暫睹堂奧門限方知知非二字受用不盡但言者漢是者漢只恐猿猴窺水中月耳道非今古人無彼此唯居士初年不遇作家鉗鎚縱得遇之而亦未嘗咬指相為或自未肯著死工夫至今年邁氣衰心力不如豈非輸他如何果肯徹底掀翻即自另有箇消息在故大慧杲教人做工夫當立在轉處勿死在一路此其自驗的家具故有十八無數之差然亦不可死在十八無數之裏如或不然便當死心淨土莫踏兩船以自賺誤來云用昨方子不必定要數珠計數但放下諸緣驀直念去自然得入三昧此時要見面孔亦是不難誠哉是言苟能放下則面孔自露矣劉公少年歸依憨山大師年至八十始參本師師時逼拶之一夜端坐工夫逼切豁然惺悟通身汗洽年八十二未終前七八日聞蓮花香臨終語其子曰在大師恩大難報汝當為我敷座堂中我出坐化令人知學佛有驗也其子畏天寒不依語遂寂然而逝復淡歸禪師接手札知瓶鉢端溪何不我顧以解積懷耶別來雖云寒暑再更而山色依然故於此間足見具壽顏面道體常如也久傳丹霞形勝未及親瞻茲閲佳刻誠不虛聞是知山靈有待因緣時至而瓶翻大地也他日梵剎丕成留一半席與行腳僧何如倘未言旋即著人迎錫共話數日亦見末法中之水乳也具壽云長老復曾續慈清士佛法子已知矣而未能行之世法子已知矣而未能捨之其未能捨處必須捨之未能行處決要行之不可以時待人而人不待時也眼底兒女現前風光實非身後莊嚴牌子子須善察幸無錯認鏡像水月虛度一生再生難逢即此生亦未能保如今日之安也來云四十五十不知尚能幹辦否老人不言不能但於子二事弗敢許也一是天命二乃衰邁臥起尚假人力何能措志加勉復更添數十年塵習而欲一朝蠲滌恐未能也老人憂此故每念子耳子今來問如有人問八十公公能負百斤日行千里否豈不益旁觀者笑哉真梵菴每得匡護實子之赤心也亦當韋天將一橛杵矣誠知子護他拳拳猶須自護諄諄可也言自護者勿縱六情被五欲魔縛是老人之深願也復何壬生明經言面邈隔已及四載時思晤話每悵無緣忽接來翰深生慶慰知居士興居與道念皆勝是即心即佛之關犍矣心佛既無二途但識其心何勞更問其佛須於二六時中猛著精彩覓心所在要得親見始得不可穿鑿以理解會失卻本源唯當仔細用心佛祖決不欺人一朝廓落心佛了不可得何處更覓生死塵勞於此倘未薦得不妨篤志西方發願往生彌陀親為説破一生當證無上菩提豈不慶快者哉復劉璞公文學久闊玄話殊抱悵然客冬濟令姪持手教相訪甚慰遠懷此來道念增進不問可知但于日用頭邊能不被聲色轉漂否耳光陰易邁識浪飄人居士時當自發猛省于生死妄想輪中決要尋箇出路始不孤在閻浮提中走一遭也山中甚清淡而松風水石亦可遣興延談居士儻能撇下俗緣不遠一到得數日相聚者何快如之復宋斐然都統劣德山僧僻居寒谷忽枉台車遠顧問法殷勤可謂夙具靈根能于崇勢福樂中特求覺悟真足楊眉嘉羡矣茲復承健騎齎施白粲朱提山中衲子俱汗慚飽腹為祝福無疆矣儻移鎮未期尚冀雲乘再降以得話徹心源一日千載也復梁顒若明經聖賢之學求為真切力行及有所得此自古已難其人況乎末代所謂失道而後德失德而後仁失仁而後義仁義失而譎欺浮靡日馳殆不知返豈世風使然耶頃於鳳城旅館曾獲一瞻眉宇知為端介沉養之士別後魚鴈荒疏徒懷悵切昨元夕後自新州還象林忽辱華翰佳什先施捧讀至再愧喜交衷真言言顯道具見學力所操獨間所獎譽者覺文過其實貧道何德以當此然如居士以碩望淳儒傾心學佛則又何讓馮濟川張無垢諸大老專美於前乎且聞居士欲捐盛産為祗林梵宇以善誘同人薰修淨業期於菩提必證經中謂末法中有諸菩薩現王臣身興揚佛法今居士欣然以慈門德行自利利他誠為菩薩心懷歟來作有願乞賢師一藥方句但居士妙明真體迥絶塵煩縱有靈藥未審何處容施願居士其毋瞞山僧矣俟白蓮送香丹荔呈玉當策杖前來為居士笑破復博山雪澗和尚先師翁老和尚誠一代尊宿行解圓備節操孤高中興洞宗為法門所倚故當時德風所被海內傾心而博山一脈至今猶存且振者蓋憑老法叔支持鼎力也仰惟法叔接引人天不倦陀羅之臂弘揚祖道先標結集之心作用難思宛為妙則法門深幸良在斯乎某自念緣慳附驥才愧守株昔從方外行腳回即擬活埋窮谷不意戊戌間頂湖得度先師歸寂衆遂強推住持今以年漸衰邁只得掣肘退席獨是修營如來窣堵波宿願未能頓滿而祖庭掃塔丈室還拳雖屢憶惕中懷無那因循致慢愧赧又當何如哉茲者深沐慈意法語遙頒拜而披讀具見婆心念我為法求人然擔荷法眼人人應奮丈夫第恐駘質樗根不堪鞭繩為慚恧耳聞粟兄已膺命出世某忝連枝曷勝欣忭靈苗蕃茂可拭目而觀之矣承諭鐫先師翁全録此實慧命尤關豈惟恩酬法乳兼為後哲南車某敢不效誠以副尊囑乎茲因貴侍言旋敬勒片言恭候杖履外容別圖抽身請益聞所未聞也復博山粟如大師久嚮玄風為日已積每以未獲披晤為悵而水光山翠與法兄旦夕嘗之又未曾有異纖毫也弟頃自方外還即陸沉寒谷無出頭念蓋以福淺慧微不敢望諸哲匠為愧當何如矣邇聞法兄芳年德備挺住博山光振門庭令祖風不墜弟私衷慶慰寧有既耶茲承手諭以鋟梓先師翁法録為謀可謂知恩可報他時流布海內俾無量緇素人天因斯得開正眼其功德可言喻哉弟雖薄於福緣收不罄衣鉢資隨喜今上首回敬勒寸言附候興居尚容另圖握話以暢渴懷拙刻塵覽不宣復壽昌觀濤和尚大澤産龍南山伏豹故知神變之物非高深曠遠處無以養成其頭角爪牙令師老和尚法門巨匠從其爐韝煆煉出者必皆意氣威獰作用超群狂瀾砥柱此正老法兄今日應運再來也弟昔于丙子間不揣獠民固陋也曾隨例行腳得禮二三尊宿獨愧蹇驢跛鱉終乏致遠良才今年漸衰憊匿迹邊望法兄領袖法門為龍天擁戴不啻雲泥相去也夏初某禪人回辱手書大作法録先施披讀間光徹南海真現前古佛非言舌所能讚揚至於別品佳儀又何愛弟之深不知何以報璚耳茲特著某來奉訊動定萬安為法利生不有疲勞耶附有一香遙供老祖支提值因時艱福薄殊不成展于孝思慚愧何如哉何時謁祖曹溪俾弟得藉聆謦咳并一敘天際孔懷則喜山望外也外拙刻塵覽微物引敬臨楮無任神馳復黃文侯孝廉某回知居啓康勝道意汪洋殊為欣慰來翰所談甚有理致信向幽衷具見札下第學道之士必先發勇鋭決烈之志如輪刀上陳立要勦除怨敵不然紛華聖道交戰胸中則旋進旋退率未有以證詣也今居士大有靈根既知欲泥沉象則須疾奮出離若徒有厭煩惱之縛不急截斷根源將恐染緣易就道業難成二鼠催侵四蛇競背何以勝此也居士既要自性必明生死必斷則宜先空世見穩踏腳跟勿落宋儒偏局迷窠致善惡殃慶自生矛盾竊佛法之玄微回為己説以邀聲譽于時人浪誹釋教高築慢山誘引一類撮囊流輩誤陷邪途又何怪不墜泥犁而為龜身業種乎居士高明博達於書無所不窺但性理一宗非粗心浮意可能造極倘不以貧道管見為非可與共談則期放下家緣至荒院一同徵詰或如趙清獻公有撞彩磕著時也二鼠日月也四蛇身之地水火風四大也泥犁地獄也復吳震飛兵憲令弟持手札辱臨深感存注道念且悉動定清和與春光俱暢孰不加額所言劫運流行群生遭劇凡在含齒誰不痛懷今居士有心有力能不惜泥水正是菩薩利行方便之時不獨道人為之欣躍即佛天好生成物之仁亦已默祐之慈光矣事出有名緣自應順率此暫復諸容另布與尹瀾柱銓部曩者過金繩禪院叨承香饌鮮慧沙門不識何以報德惟深慚恧耳及後同舟復接名言為暢談敘間居士謂西方只是此心別無方所時未及詳論然西方淨土有事有理言事即從此娑婆世界西去過十萬億世界外有世界名曰極樂是阿彌陀佛應化之境廣大無邊娑婆世界如牛毛頭一滴水之量極樂世界如四大海水之量彼佛現在説法觀音勢至是彼佛左右二大菩薩馬鳴龍樹諸大菩薩及廬山蓮社諸賢皆生彼處昔善財童子五十三參最後見普賢菩薩教發十大願王往生極樂親近彌陀彼土無生老病死及三惡道寒熱諸苦思衣衣來思食食至黃金為地七寶宮殿自然備足故名極樂亦名淨土然淨土有四一凡聖同居土即九品往生四色蓮花如四大海水者今人念佛雖得往生彼土猶是凡夫未證聖位而與諸大菩薩共住見化身彌陀故名凡聖同居土二方便有餘土謂聲聞緣覺已斷三界見思惑盡得生彼土尚餘無明之惑未盡故名方便有餘土三實報莊嚴土周圓無際衆寶莊嚴純是三賢十聖等覺諸大菩薩所居見盧舍那報身彌陀故名實報莊嚴土四常寂光土即理性土無有相貌方所是妙覺果佛所證三德涅槃法身所居者能居即法身所居即土三德者法身解脫般若常即法身寂即解脫光即般若是為三德惟佛與佛乃能知之言理此心本來清淨無諸妄想塵勞煩惱自心即淨土自性即彌陀若卻事談理則九品無分苟執事迷理淨念心純猶生下品故匹夫匹婦鸚鵡鴝鵒皆得往生若事理雙修即生上品故維摩經云欲得淨土當淨其心隨其心淨則佛土淨茲冀居士事理一貫行解圓修與馬鳴龍樹蓮社諸賢同遊極樂親睹彌陀是衲之所深願也復番禺增城衆居士諸佛御世秪為欲撈盡大地群生列祖出興不過要打殺普天下命根即如洞山老祖密施金針剔開靈利漢子頂門法眼以至先瀛山亦別無伎倆只是隨例向人天衆前撒添沙土貧道則愧德無可賢齒徒虛長濫承推愛誠非所安惟羡衆居士具大根器勇猛丈夫正宜不除妄不求真曜起金剛王正眼當前一覷直得凡聖平沈獨露堂堂恁麼時方好來問畢竟喚作阿誰今欲為公道破恰值口門塞卻來云曾睹水影是渠是我畢竟實是阿誰復秦汧甫居士不晤多載無緣促膝舊歲旅中暫遇未盡懷抱為歉茲接來札不勝欣慰來云連遭蹇厄斯是定數愛別離苦世難免之故佛教人早修以超八苦尊目復明非信心所致不能有此又云百纍關心焦勞倍甚何不觀龐居士推金落海賣籬度日夫婦男女共修故得去來自由既無愛別離苦況有百纍焦勞乎來云依經應無所住而生其心研求無住已難生心尤難然此非再來人觸著磕著終難下手又言世事纍人不得常時靜坐何不於四威儀中聞聲見色舉動言談迎賓接客穿衣飲食時是箇甚麼他毫不違我念而我不識他當急覷捕若心不放捨必有箇下落處古云佛法無多子久長難得人但辦肯心決不相賺若知下落方來面決復不妨早夜於阿彌陀佛前稱名禮拜發願一者至誠念佛一聲滅除八萬四千生死之罪二者縱得開悟猶有無量劫來習氣種子未除親近彌陀淘汰宿習得階聖位龍樹是初地菩薩尚往生極樂況其未悟者所謂有禪有淨土猶如戴角虎是也此復音釋昕曛上音欣日出時下音熏日入時駘音臺駑駘下乘也八風一利二衰三毀四譽五稱六譏七苦八樂謂此八法人所愛憎而扇動人心故名為風毗尼此云律咳詆上音孩笑也下音邸訶也搦音諾按也祗林祗陀太子所施之林即給孤長者之園陀羅母陀羅即菩薩拯接衆生之慈柔臂也忭音便喜樂貌璚同瓊音煢龜身是庾信故事載六道集第五卷趙文信篇趙清獻公宋神宗時與天鉢重元禪師為方外友而咨決心法一日聞雷有省即説偈曰退食公堂自憑几不動不搖心似水霹靂一聲透頂門驚起從前自家底舉頭蒼蒼喜復喜剎剎塵塵無不是中下之人不得聞妙用神通而已矣鴝鵒上音渠下音育八哥鳥也苴音疽苴菜支提即塔那伽此云龍見思惑者謂三界見惑為一住三界思惑分為三住根本無明為一住共成五住地惑也方便土者謂二乘人修方便道斷見思惑所居之土也實報土者稱實感報故也謂菩薩斷惑有未盡者居此土也弟子一享等捐資敬刻剩稿第三卷身心離障福慧日增臨命終時無量壽佛親垂接引康熙癸亥仲冬吉旦識
