body:
  text: 侍者傳調錄偈頌庚戌元旦別慧弓首座號石箭一弓纔秉須彌殞質毒箭仰施虛空失色聞者膽喪擬即敗闕唯有瞎驢不避斯的辛亥夏日別犢蹤溈侍者字薦犎溈山犢一物兩名誰敢酬饑惟食渴趣流牽向溪邊喜哮吼一回放一回收臨溪兩兩眸對眸芒繩斷失鼻頭牧童交臂自綢繆月到中天兩不立體用全彰一袋收不了此中端的意奚能薦得犎兒祐空石比丘法名傳意祖師西來意空中一片石欲得識渠渠切忌頭磕著片石侍者南泉滿口道含糊賺殺當年陸大夫直下拈除得不得空中石佛跨蟾蜍解牧侍者求書執杖視之字復示之以偈堪笑南泉王老師牛兒不牧溪東西東西言犯王水草隨分納些滿路遺執杖視之世尊語老人親切為你舉不知纔擬執視間牛兒打失無處所汝今解牧真箇解解者為誰牧者何當下若能端的去白牛迥迥露前坡馬玉文法名法雲更字別山咦者箇馬郎子真是偷心不死既與法名又要更字好不知足貪不知恥大似今人求買拂子噫非非非畢竟何是果不知足貪不知止恰如後覺祈先覺記噫非非非畢竟何是本自現成奚用粉脂故諸大士不欲聞記噫雖然如是曲為今時世諦流布名言豈離是不獲已因而書之免使錯認驢駑喚作驊騮駒子宋斐然元戎回朝索記倚天長劍也大奇明仙授與不須疑金雞啼破青牛夢北斗南看正是渠其酉年奉旨出嶺至江右復奉旨丑年回粵壽陳汝德居士問君舉踵自何來不種菱花愛種梅香風入座雙眉展惹得虛空笑滿腮壽何隆將文學七十一知君曾見鐵花開何年移向此中栽石女時溉猶未已鴈歸北去燕南來壽李淨業居士鐵榦凌霄白玉堆從來無影向空培若問何年親手植泥牛入海漫追回贈空渠禪人往海南住靜大隱沒蹤跡韜光失卻眉石女臨夜鏡相看不識渠贈林直衢居士流水傍溪直高低亦隨衢隨流認得性兩腳任卷舒壽承乘長老六十一初受和尚菩薩大戒六十餘年事若何居俗日鮮為僧多天命既知非分外牛尾拾得唱哩囉童顏鶴髮世希有難學者點孝慈和他日聲名震四海肯留半席老人麼贈覺溪王近事法名開澤道號滌渠聊將曹溪水滌盡昔時非忽從大夢覺方知我是渠天堂并地獄也無安身處休忘火宅內澤汝宿同機贈羅定文總戎曾向靈峰受莂來龍泉湧出嶺南臺箕茭階前香拂鼻歸庭又覺百花開和尚七十一杖底風生吳越遍芒鞋又羨五臺巔率爾不從心所欲依然身臥鼎湖邊昨夜芙蕖芳拂鼻今朝日午月初圓勞君為祝清涼壽我為君祝老彭年師年七往南浙禮供舍利塔欲上北五臺山禮文殊菩薩自寧波回至蘇州聞嶺南波濤之作遂還粵故不果行也壽劉中雷司李八十一頌自號石洞老人曠哉無上道非智莫能周唯有過量人澄潭徹底透經歷微塵剎侍多千眾祐建諸總持門深入那伽寶名高臘復長慧深德倍茂蟠桃經幾摘泥牛漫記秋弗耕金粟壟貪遊妙喜州錯腳踏毘耶共議不二酬眾口既喃喃忍噎難咳嗽跳入石洞中掀翻他窠臼撞破娘生面寒光爍斗牛秪因婆心切白雪來堆頭或為童子戲時作種蓮叟蓮花輝四艷品階逾重九惹得東西里稱賀無量壽我以海墨志忘卻第一籌眾祐是世尊舊稱毘耶城是維摩居處前身是金粟如來後為東方妙喜世界不動佛之菩薩那伽是大禪定也己亥元旦舉筆頌新雨籠元日春色滿山疇田夫陳播植行者須上求修行無別法秪要曉綢繆隨執一句子百千一齊收久修不通達總由情未休了卻心意識前塵本自浮說甚根與塵三祗劫歷修聖諦尚不為何言階級周天下本太平縱橫任自攸一見雲門老奚更問趙州橫身歌白雪側掌泛壺舟問我意何似西江水長流詩贊遊新州龍山國恩寺恭謁大鑒祖師喜賦二首道無南北與中原五葉同歸此一根初祖骨皮分付盡大師衣缽且留存峰頭環伏真天畫寺額金標是國恩擬把妙心求印可目瞻香篆已忘言用憨山大師韻萬曆間大師親筆書國恩寺壁至今康熙猶存本來無物豈沾塵千載同欽見地真道在寧妨磚累塔性空留得肉生身當時呈偈非關字今日拈香是舊人正欲弘傳師法意可容錫井鑒前因贈黎居士和尚于己亥前聞黎子有出塵之念因以書勉之時黎子以親緣未了未遂拂衣荏苒因循又覺十餘年往矣黎子之心猶不退也今庚子冬日欣然持和尚舊書來謁和尚嚮其真誠占此贈之夢裏相逢十餘年今朝覿面豈曾嫌此回莫更南柯去好向湖峰學米禪李長華總戎承平南王命至山炷香賦贈詩書名將孰云無獨愛將軍仁且都弱冠登壇人共仰親承王命謁浮圖壽李慧菴居士六十一翻卻龐公省事禪笑將婚嫁作閒緣老來自得安心法萬不干懷一等仙贈斐然宋元戎法名開嶽號德峰特達英雄漢揮戈不昧禪金風吹勁草識取未生前壽陳公孺山主法名開諶道號玉蕖羨君宿植信根深世上豪華不著襟花藥頻添冬日務經禪偏長晚年心園蔬預遣供僧饌租鈔先除髹佛金無限風情兼月話不妨居近覺皇林瑞塔寺後即其宅壽新興李邑侯乃翁卓然居士羨君曾踵昔賢來自種高槐作棟材近結耆英為九老香風披拂壽眉開贈王榮我高要邑侯仙令翩翩蒞瘴鄉犬無吠野雉馴桑政閒時理修因事重把祿金布法堂又難兄琴鶴化蠻城難弟金吾侍禁庭可待功成作相後肩將瓢笠事空生弟是御前總戎贈亨扶蔡居士七寶財豐長者家上根單設白牛車如今法法成三昧匝地清風笑未涯壽實峰鄧居士法名開權憶昔威音劫共遊今來又復聚閻浮宿緣豈上三生結針芥非惟一旦投我趣非家慚懶拙君因入世羨風流六旬才德已兼勝三代檀那孰與儔鄰里沾濡聲載道兒孫卓犖氣吞牛榮華花報何關意淨土莊嚴是取繆笑我叨為辛亥長輸君幾種福緣周色身聊把岡陵祝慧命難將海墨籌次韻酬顒若梁隱士居鳳城鳳凰儔隱鳳城旁笑視昏鴉嚇鼠忙老氏擯知為魏塞曾翁守約始成長目前好景皆陽炎世上浮萍只電光若論無生斯可貴昔賢曾是嚮西方昔賢是指十八蓮社復印東陳居士煙鎖茅堂靜緣閒白日長空懷陶隱士遙隔淡雲鄉酬青原藥地和尚昔年隨腳轉曾步千金臺何處大山佛飛光直到來寄懷陸義山中翰先生生便心明了自說前身是德雲山院可能今又到木樨香甚不遮聞和尚六旬作古今十世圓當念六十年前此日生已豁空花不捏目從教水牯強呼名無星秤漸酬機懶折腳鐺存逸老情便欲移茅更深入聖凡欣厭一時冥壽柱庭鄧居士與和尚同庚我生仲夏末君誕季秋前知有宿緣在同為辛亥年羨君德方勝愧我道何全檀信誇三代桂芳喜二賢善功既廣積嘉慶自長綿不慕神仙藥惟欣佛土蓮佛稱無量壽君亦壽無邊壽崇梵闍黎六十一曾在柄和尚羅峰和尚本師處作闍黎禪鋒淨論不諍贏嶺海爭知高座名臘長心閒無事事摩尼百八手常擎次韻酬瑞卜何居士入社人稱羨姓宗竹林幾度慰過逢究來知識道仍隔黜去聰明理始鎔庭柏砌花呈祖意天雲瓶水豁迷封無懷在在饒真適何事鱸蓴漫憶淞次韻酬壽昌觀濤和尚鐵船高泛千峰頂不犯清波誰巧並窣堵紅詹人再來家風近喜君重整祖庭雄踞吼如雷外道天魔盡破摧峻絕信知非雪嶺那能產此棟梁材逸足神駒追電駕蒼蠅徒戀焉容借知音獨許深心人欲露全明窺半夜節拍聊將大眾憑赤窮隻手舞何能凝眸遙睇皋亭上圍匝黃雲一萬層壽麗初簡居士六十一慧植多生信入深福田逢處滿鋪金道高耳順勤精進欲誘兒孫證佛心和尚七十一逸老孤峰計已施萬年松自長虯枝泥牛千古誰人覓木橛一椿任我癡午夜天空聞謦欬有時機叩只揚眉獨憐七十余生晚堪笑雲門棒下遲山居雜詠十首一根歸攝六根收我也無心境亦休昨夜西風驚鐵馬今朝瞥地駕泥牛溪中歷歷分長角月下明明露白頭世諦榮枯閒自若常隨萬物度春秋病容消瘦興偏多閒月清風共琢磨山靜瓦爐香縷盡一聲謦欬意如何虛谷松深野思微蓽門苔長客來稀等閒獨自溪頭晚坐斷晴雲幾片飛梅樹根深都已老重披蘚荔禦冰侵有僧花下癡獃坐欲得薰開太古心數朵梅花先日放薰聞不及作香知憐渠七十詩僧者鼻識應慚落鈍遲雲鎖千峰寂溪空一鳥啼欲描此中意懼失老僧眉坐看溪雲散山花意欲飛無人來語話長嘯付清機曾到東山寺沿溪折野梅逢僧三五輩笑坐白雲堆坐看山花笑臨溪戲游魚忽睹娘生面吾今不是渠桃花幾欲放野色映山新攜得無心輩分裁門外春山居佛祖真宗絕掩藏溪聲不斷為宣揚叢蘭抽蕊點山徑疊嶂排雲護草堂鄰老病虛頻夜惺行童癡重慣時忘人來欲借無縫塔為道好皮莫剜瘡素雲晴鎖萬峰秋丹嶂危居一比丘活得百年只是氣悟無少法不如漚鷃鵬休互嗤高下椿菌何須論短修教意宗乘莫我識砂鍋蔬熟笑無油鳥韻花香春自鬧窗閒林寂道如宜一條楖栗逢溪度半卷楞嚴倚樹披高下隨平田有在玄黃忽略馬何為菩提妙法非空色緣念未忘被物羇數擬出山訪故人松門觀鶴每逡巡自閒白社荷衣老不是黃農木食民秋夜小亭懷蜆子西風磐石夢驢脣真成獨往空千古一抹溪光姓字淪太虛終本無明晦萬象都來一鏡空松塢晝清人倚樹岩臺秋好月和風總休計彼居迷悟不必從予較達窮聽徹溪聲千疊響只今道與泰峰崇傍崖築屋遠𡾓城滿甕蓮花物外情漁父莫知幽澗趣樵童安辨隱人名輕霜草樹芳桐老暴雨松坡紫菌生一笑古今成夢事幾回禪起獨經行峭絕青山匝萬重中無一物可消容養來病雉應知法放去閒雲好自縱猿向斷崖巔樹挂蠆尋枯壁孔泥封隔林舊有育王寺隱隱猶聞清夜鐘千章古木繞茅齋曝暖閑麋臥土階盤藕遲花都可意山蕉充紙亦舒懷雲橫斷壁人何遠月照斜峰境愈佳端合無渠知住處真強哉矯把名埋光陰迅速事如何及健提撕休更蹉拙斧攜將山去住碌磚堅作鏡來磨冰鎏蘚石添蘭氣霧鎖蒼岩長桂柯任爾物情趨勢利寂寥長對古彌陀事得無心理自圓松聲艸色現成禪石頭何意硬成佛鰲足空聞直拄天月被雲遮光不下水因槎礙澀難前一時塵剎俱空去誰辨中間與二邊世途巇險欲何之草菴歸去青山陲百念盡凋持貝葉一身輕健飯靈芝石窗散誕忘乎我盧谷迢遙訪者誰咫尺華胥遊未遂暫沽明月暢佳思天地未應同我闊何妨山裡石岩岩懶隨雲水出人世樂愛煙蘿住草菴撼木風生饑虎怒釀花酒熟老猴酣閑閑較歷娑婆國無似枯禪百不諳世上人誰識渾金聊攜缾錫入荒岑拓來瘦地三餘畝苫得虛齋兩半尋壅有疑情勞面壁苦無閑步訪山陰悟迷由汝無多事獨自盤桓朗夕吟寂寂寥寥似可依坦然尚覺去時非碧光匝嶺客塵斷翠色盈軒道意微風怒晚林摧敝葉月憐秋冷為長暉坐來竹露成珠顆猶自聽泉未掩扉毀譽不干欣厭盡塵緣終省到茅齋嚼苗辨藥神農暢臨水觀經意自佳暖谷護花雲裊裊疏林飫果鳥喈喈滄桑任變寰中事一榻高眠萬慮埋半兼禪律半耕樵自昔攜笻不限橋活句每從苦究得光陰多為懶磨消白翻遠岫銜花去黑起深潭怒雨飄故我住山忘籠辱一龕高臥傲神堯秪許閒雲伴拂衣逍遙物外與誰歸落花滿澗思樵藥寒日半山歌采薇入戶青猿依磬定出林黃鳥破煙飛人間世事多如幻六代繁華今已非百年底事竟何如一入青山五十餘眼惺不生蝴蝶夢心空寧受青牛書月沉曲彔猶蒙衲春盡幽園方罷鋤賴有白雲攔谷口是非不得到吾廬竹深茅屋靜蒲團竹杖時閒出遠觀翻把山中無少慮焉知世上幾多難風輕絕谷聞蘭臭鳥盡豐枝厭桔酸空劫以前何必問日斜敲磬思漫漫毘盧遮那佛贊如來以大悲願力入如幻三昧攝化群生所以有降生成道說法涅槃之相而凡夫不了大權示現悉起斷常生滅之見惟有沒量大人證文殊智蹈普賢行遊華藏海見毘盧遮那如來身心不動於一毛孔中坐十方界轉大法輪教化無量有情未嘗休息噫休息與不休息且置如何是毘盧遮那如來聻咄好著頂門眼月智如來贊華嚴藏海中明鏡世界月智如來晝夜恒說法音十方四眾悉現其身往集聽受因為之贊曰當臺明鏡絕遮攔螟睫彌盧莫自瞞欲識廣長無間歇溪聲依舊水潺潺阿彌陀佛贊肉髻浮千嶺紺目徹四瀛六八深弘願九品悉歸源坐寶蓮華上光明遍界清有願咸拯攝無生不出欲得躋彼岸觀想及持名心裏無他物彌陀胸中現無量壽佛贊即阿彌陀佛十方諸善逝福智皆平等惟有度生慈彌陀佛稱最六八深願王普攝群生界施列九品蓮隨根各蒙濟威德相嚴嚴巍巍出心量今此墨圖形聊爾存瞻仰咦即相非相二俱非春風先入梅花國西方三聖贊十方諸如來同出廣長舌窮劫贊彌陀演之莫能及有情歸向者遠離四山逼纔爾一稱名妄念從此釋欲趣八德池須識第二月淨念之樂邦返聞歸常寂心境若長空彌陀當面立淨念即勢至返聞即觀音廣博樓閣三聖圖贊一心近事請手羅千眼法界露布寶閣凌空象王迴顧師子嚬呻虛空骨腐月前薦取波澄月皓一色一香無非中道舉掌低頭家鄉已到千生不逢萬劫難遭一心供養叵思妙報圖中畫千手千眼大悲右文殊左普賢上廣博樓閣靈山圖贊山名耆闍崛非文亦非質秀出眾寶峰言辭匪可述十方薄伽梵時亦共遊適是故釋迦尊說法曾未畢劫火燒海時毘嵐風相擊此山常安隱凡愚詎能識唯有末量人天台親證得五百無事僧授決猶未息我今稽首禮長接如來膝梵語耆闍崛華言靈鷲山山頂西垂似鷲頭也昔釋迦如來與五百羅漢授成佛記天台智者大師誦法華經忽見如來為五百阿羅漢授記猶未息故今寫五百羅漢薄伽梵乃如來眾德之稱觀音大士贊巍哉觀自在古佛正法明威披弘誓鎧不空絹索長四八應如幻九界沐悲光佛容浮寶髻法雨灑塵方圓協如來慈遍處火宅涼由昔了聞性於今應如響無緣咸拯接況禮及稱揚摩尼隨所現功歸無畏鄉觀音菩薩擎蓮花贊手擎紅蓮面輝慈芳心似寒潭澤及萬方本既非男奚得女裝一極悲心四八形彰不離本際月印千江心境交徹未易思量喚驢喚馬一任安將乃佛乃祖亦恣敬仰咄還有識觀音菩薩者麼驢嘴未張金臂現泥牛入海浪翻天千手眼大士贊謝慕真請大悲觀音千手一心無緣慈運護照群萌一雨普滋受益隨根稱名禮拜猶響應聲當處返聞獨露全身入流亡所即見法明謝子奉供斯為慕真準提菩薩贊法身非相非無相毘盧頂上炳圓明體用妙融彰二九特顯如來不共乘照護群情猶響應所求悉地隨心成俱胝沒馱由此證稽首步步踏前程俱胝萬億也沒馱即佛也十八臂表佛十八不共法也十六羅漢贊十六大羅漢受佛親遺囑至今未泥洹為世作良福各領諸徒眾分住洲山谷外現諸神變內心無三毒面貌雖不同鼻孔皆無肉欲得識渠渠急著眼睛豁爾解翻身二八元來一十六十六阿羅漢今現在世間各領眾徒或數百或千條住諸山諸洲護持佛法為施主作福田若人齋僧即變作凡僧來應世謂十八大謬也泥洹亦云涅槃此云圓寂德無不備曰圓障無不盡日寂達磨祖師贊此老度生心急反招藥毒面黑梁皇不契無聖折蘆少林面壁躲身熊耳峰頭敗闕蔥嶺沙磧咦還有識得達磨者麼惡布袋和尚影贊眼掣流星口懸半月晏坐街頭橫舒木橛逢人即乞無言可說淨穢皆收一袋囊卻八苦交煎安閒自若撞頭磕額人莫之識臨終自露一場敗闕何故如此只為當初願力牽今朝特地婆心熱像持布袋橫按拄杖地坐有八孩子拔杖奪履抯耳摩奶入袋取物種種戲之以表八苦和尚影自贊王莫愚居士請此老無道可尊無德可稱形如枯木心似寒冰五十餘年依村傍山佛也不念禪也不參問其終日何為未能學箇閒閒又田居士請像在此僧在何休言一箇兩箇若問其中意旨如何不妨為你說破懷州牛喫禾益州馬腹皤又濯足影贊錫缽在旁生在威音窟裏死被蝦蟆吞卻目前不識伎倆只曉傍溪洗腳乞得半缽破盂飯歸來分作三口嚼有問西來意旨如何仰面呼天苦殺苦殺又戴居士請此老無長處便宜一世懶書詩無渠分筆硯不相關參禪眉先攢看經黑漫漫欲要持淨戒舉心即便犯如何度歲月朝晨三盅稀粥水午來兩碗老米飯又本山大眾請者漢不入羲皇室那識老婆家初耕湖頂地鋤頭反手把愛春盧能米渴種趙州茶狂心猶未歇撞破嶺外霞僵臥瀛山巔天童驀腳䟕翻身入缾窯卻噉雲門鮓歸來醉未醒乘興弄胡笳石人擬欲和聽絕不成嗏舒腳月下坐松風瀟灑灑面目一何似鬍子連嘴巴有問箇中意如何倒拈拂子劈口打影持拂子瀛山雪闢和尚天童密雲和尚缾窯永覺和尚雲門爾密和尚又者箇老漢把你當佛你又不為把你當驢你卻不類畢竟把你當箇甚麼咄畫不成底秪者是日出銜山露不全李芝木明經影贊立蒼松下道號淨業文武兼備此翁何所似恰如老金壁靈格自天成非承渠恩力四十九年前揮戈說詩易忽爾知天命胸中無一的詩魔與酒魔化作維摩翼撇御鬼畜餐學佛中道食竟日口喃喃自哦還自適樂矣松風下貌歟奚似昔僧兮為俗兮安排即便失畢竟恁麼是首羅覷不得你欲知少分頭頂天兮腳踏地良生馬元戎影贊道號鷲翁手扶笻常誘人受八戒似則似矣是則未是錯認驢脣老喚作馬郎氏秪因婆心切杖遊堪忍地時示將軍身或為道藝士應現既無方誘進難思議畢竟是何人咦雖然相逢不相識卻被天湖號鷲翁鼎湖亦名天湖娑婆此云堪忍王莫愚影贊公善醫化千餘人結放生會法名法諝者漢手不似佛而能應病與藥腳不似驢而能踏破筌蹄隨機接物而不俗鬚鬢雙垂竟非僧那吒不得命其名首羅豈能窺其體畢竟是箇甚麼人直待虛空失卻鼻自當為汝分別分別本心近事坐蓮影贊花池中寫一月輪識得娘生面勿疑此老拙世法頗精通念佛口不輟兀坐蓮花臺鼻孔穿水月恰似無事僧休疑龜作鱉豁然曉本心彌陀為記莂一心近事影贊生自空王家覿面不相識目光爍太虛齒懸數片雪一心若湛然萬法當處息咄領取一口西江水方來為汝出長舌其影露齒記銘西來山白象林小龍湫記言象林之勝則小龍湫得其奇湫在象林院外左廂其水源去湫數十步即聖露泉迸出於山凹叢石間翻瀾迅疾成小澗流湫當澗流奔逸處廣不踰四尋縱不盈十仞而蜿折高低疊作三層級每層級接連橫石脊為關限隆起嶄然巧於彫鑿水行艱澀激淵而成短瀑其聲潺潺涓涓緩急中節如鳴琴如鼓瑟兩岸之石狀皆譎異參差聳卓又其石出水面者嶙峋突兀而繡蘚錢浸水下者岩宕溯匝而織苔茸石縫罅生瘦菖蒲秋海棠諸小芳草根葉蔓延縈艷纈鮮然湫三疊中者減淺下者稍闊上者淵莫可測底布璨石明沙與莓毛相牽帶水色湛徹如吠琉璃臨之者鬚眉頓鑒余雅愛其奇嘗與二三徒侶列坐湫邊亂石言談余搖犀牛兒扇自謂金谷蘭亭無以過是以彼一時暢敘名士高僧樂甚乃境興情歡斯樂則情生境外而即境無生耳見目聞無非妙用三摩提者湫下流不遠合左右溪灌作放生潭潭上古木叢林為楓為松皆百尺摩霄鷦鷯鶯雉巢厥枝柯樹下復多巨石方者危者而盤而峭俱可充床座恣禪寂快雄談因為是湫增勝云爾時會坐有居士忽問余曰湫在此龍在什麼處余急捉其鬚曰在什麼處士茫然余拓開曰者曝腮漢當面失卻龍矣寶象林瑞塔舍利函記恭聞如來三祗樹德百劫修因行滿果圓成等正覺住世七十九年說法四十九載度盡有緣雙林示寂復以悲智碎金剛體而為末舍利施諸群生而作良祐福田俾植人天妙果永作三乘道因貲自惟無始劫來惑業障重汩沒三界之內輪環六趣之中弗睹佛興寧蒙記莂不預涅槃末會奚獲最後申供幸宿蒔微因得值能仁遺身舍利一瞻一禮滅我怨愆一香一燈為世間眼粉骨難酬塗膽莫報茲謹捐衣缽淨資與諸四輩建立寶殿并白石浮圖舉高一丈八尺六面玲瓏彫鏤成就奉供能仁調御金剛之體泊安諸佛栴檀聖像以此殊因回向無上菩提不歷阿僧祗劫次生即成正覺再乘大悲願輪遊戲生死海中眾生未盡我願無窮更祈人天四眾瞻者敬者遠離三災八難一花一香皆生安養不動佛國頌曰稽首能仁設利羅無邊勝德所成就不捨洪慈悲願力施作眾生良福田他方此土流光燭咸令吉祥獲善利我樹浮圖殊勝因次生願證無上覺舍利亦云設利羅瑞塔然燈記余建白石浮圖石產於端州星巖潔白如玉舉高一丈八尺安於殿內表如來十八不共法也七層六面彫鏤玲瓏以明七覺支六波羅密之和會也面各開一門門各坐一栴檀佛像令人就面面門門親睹清淨法身也一一像前各置一枝珠蓮花花上然琉璃燈一盞一一燈左右復設珠蓮花一枝花上置鮮花一缾塔層數既七燈數也七六七燈映交光復以種種香花燈燭周匝於外羅列焉每然燈則修敬緇焉素焉合輒百千指圍繞一讚一禮訖旋轉如輪光重重影重重光影交攝互相徹見其燈也微風吹動炯炯光輝轉轉燦爛於是乎塔也通身光明不復能辯其為白石乎白玉乎已爾匾竹杖銘上匾下圓圓者圓匾者匾渠得我力我得渠健徹底風生雲飛霧卷歷遍煙波歸來依然雙杖銘其杖頭二寸下開兩枝中則合而為一下復開為兩枝相交不二而二不一而一同住同行無勞無逸點破苔階衲僧不識捩轉機關孤危靠壁傑出諸方者杖楖栗音釋鱸蓴上音盧魚名下音純菜也窣堵梵語窣堵波此云聚相謂如來舍利乃萬德所聚即佛塔也四山生老病死叵音頗不可也毘嵐風即壞天地世界之風摩尼此云如意珠王八苦一生二老三病四死五愛別離六怨憎會七求不得八大小橫禍䟕音叉去聲踏也首羅梵語摩醯首羅此云大自在天王三目嶃音暫平聲山尖銳也嶙峋上音鄰下音荀嶙峋山崖重深也宕溯上音唐去聲洞室又過也下音素逆流而上曰溯洄水欲下違之而上也茸音戎草生聚貌罅音去聲裂也孔罅纈音賢入聲結也文繒也白石浮圖亦云窣堵波亦云塔波如前釋石出肇慶府七星岩其質瑩瀠如白玉初和尚欲建塔喚白石匠二十人至鼎湖山議取無瑕淨白石匠謂石必有黑斑文難得全白者和尚言汝只盡心往取是夜無故岩前山頂石自墜下穿木月宮後墻而入殿內離殿柱二三寸不然殿即傾矣次早水月宮僧喚石匠碎石出殿匠至以尺度之每段開為二三塊以足塔用尚少塔腳方墩和尚言既全白難得當取紅文勿取黑斑果得紅文然四段合成結方六尺鐫已以水磨瑩始見其文而四段各處以合之則文相湊斯皆神力所至誠非人工所能為也塔坐麻奢鄉寶象林瑞塔寺後殿未建塔前其地有紫氣祥光衝天如晝鄉人咸訝之及建寺工竣晨旦有紅蓮花現千簷前大七八尺光燄四發緇素咸嘉焉舍利入塔時現諸祥瑞載如條處貝多梵語俱云貝多羅此云岸形似此方棕櫚直而且高高四五十尺花如黃米子其葉長廣其色光潤天竺書寫而采用之三摩提亦云三摩地華言等持謂定慧平等任持者也十八不共法謂諸佛之智內充無畏之德外顯一切功德智慧超過物表不與凡夫二乘及諸大菩薩共有也一身無失二口無失三念無失四無異想五無不定心六無不知已捨七欲無減八精進無減九念無減十智慧無減十一解脫無減十二解脫知見無減十三一切身業隨智慧行十四一切口業隨智慧行十五一切意業隨智慧行十六智慧知過去世無礙十七智慧知未來世無礙十八智慧知現在世無礙續三教圖贊一人周法界二老居六合居六彰世教周界佩三覺面貌雖不同誘善則不錯欲得識渠渠應看此一喝咄亨民鍾居士影贊士文學善丹青而能寫自影影坐磐石上蒼松下道號南溪快哉盤石上樂矣松風下目光徹四瀛胸中無滓渣一枝月兔毫揮出自與他聖諦尚不為何處覓真假咦畢竟是何人喚之則錯名之則差棲老和尚影贊乘大願輪再來無別欲誘群生遂參南浙既晉雲棲受惟心訣心猶未了要得腦裂翻身江右歷盡煙雪撞趙州門入博山室遭渠毒手命根頓絕問其意旨如何兩口原來無一舌和尚牧牛影贊和尚交臂坐柳樹下牧牛上有喜鵲一雙生來七十一芒繩忽打失牛兒飽困眠我亦閒自適交臂樹下坐鳥鳴聲唽唽月纔到中天人牛無處覓音釋十六大阿羅漢一賓頭盧二迦諾迦伐蹉三迦諾迦跋釐惟闍四蘇頻陀五諾詎羅六跋陀羅七迦哩迦八伐闍羅弗多九戌博迦十半托迦十一羅怙羅亦云羅喉羅十二那伽犀那十三因揭陀十四伐那婆斯十五阿氏多十六注茶半托迦此十六大阿羅漢皆具三明六通無量功德承佛敕命以神通力延自壽量各領徒眾皆阿羅漢住於世間守護正法為世福田至今猶未入滅乃至將來第十小劫人壽八萬歲時釋迦如來法已將滅彌勒佛不久出世十六尊者聚集天上人間釋迦如來所有舍利建七寶塔禮拜供養訖舍利即下入金剛際十六尊者上昇虛空自出三昧火焚身入滅矣今此是第九個減劫當人壽六七十歲間過五十六億七千萬歲至人壽八萬歲彌勒世尊來此成佛坐龍華樹下三會說法度無量眾生釋迦如來今之遺法種福弟子皆得在彼三會中悉蒙度脫闡提華言不具信謂不信因果不信三世輪迴善惡業報故蕉音蕉芭蕉也廣東深山不植自生高一丈餘尺葉長五六尺大二三尺有子長大如黃瓜酸澀不堪食家植有數種子甘甜大小不等若香蕉子小而長甚香甜善逝是佛十號之一
