body:
  text: 侍者傳調錄警策緇素世界空花人身夢幻一切諸法悉屬無常無可恃怙若不修行則隨其幻境飄流長劫無有返期是故如來愍此出現於世以法教之令其息煩惱火竭愛欲流處涅槃城脫生死殼然修行徑路非一要而言之有三曰參禪念佛修觀禪本無門非夙具靈根多墮岐途末劫庸流誠難悟入觀心微細如無般若之慧罕能階證惟有念佛一門最為捷徑自古至今愚智同修男女共趣萬無一失如四料揀所明秪要自辦肯心勿疑自之不得但心心不忘六字洪名目觀耳聽歷歷分明稍不分明非昏沉即散亂速宜發起精進續前淨念光陰不棄自然淨念相繫縱未相繫而心心淨土念念彌陀即寸步不移現處極樂又何待身後神歸安養有斯勝利可不努力向前將此數十年之幻質換得常樂我淨之法身寧不快哉寧不快哉頌曰三界猶火宅八德本清涼欲離堪忍土棲心安養鄉六字如輪轉淨念自相將彌陀非別有智人當自強八萬四千相不離我心王何勞再按指方為極樂邦西方淨土池中水有八功德一澄淨二清涼三甘美四輕軟五潤澤六安和七除患八增益安養即極樂策西來山主朱玉翠道曠如空不可睹有錢難買百年老罪福將來皆自見勸君努力修行好老人去來皆無他只愛他人作佛祖西方有路須當去地獄無門切勿造持齋即是極樂因念佛由來生淨土此語真實決不虛真是保身妙靈符策具五近事還潮陽來時途中遇綠林冒雪求真道中途遘魔羅直趨無有疑得禮阿彌陀終心不退轉必定度娑婆要浴八德池淨念滌煩波淨土從心得自性即彌陀行深功復滿金臺桂薜蘿欲求早解脫此去勿蹉跎若悟苦海深急須好回柁策劉閏心近事人生如夢幻備足八種苦當早求解脫棲神安養好若問彼中因信為第一步淨念是真行願堅即徑路直趨無有疑出斯堪忍土策禪堂生死呼吸何無怖懼汝經不明汝律非著心地未了佛祖何似說著心性瞠眼相視一言相觸瞋火遍地情諛相交互為癡喜寸絲粒食不思來處心識茫茫夜眠小死一聞曉鐘翻觔落地魂不依形眼尚膠黐隨堂演課如波搖柱食未到時猶打瞌睡食畢歸堂聚三說四三板敲來捱香到未不是狐思便亂猜議眼光落地何能作主天堂既非地獄難避牛胎馬腹安能免之縱得人身愚癡無智要如今日誠難得矣我此實言決不相欺其如不信自看腳跟穩未穩未倘再閑談不遵規矩速出山門必不策淨業堂欲修淨土須清三業三業既潔淨土可成三業不淳淨土無因故於二六時中勤策身口意業身勤則坐禪禮拜口勤則諷誦默言心勤則淨念相繫如是晝夜六時做去即淨土現前三昧可辦矣六時之外不得言談接對往來相看以廢淨業工夫如有違此規約者堂主舉罰三諫不從者任汝出堂東去西去策老堂不烹而飲不炊而食要溫則溫要熱則熱聽板過堂碗缽他洗肩不挑兮物不拈指堂房精麗床帳斯備聖相巍峨誠難值遇任汝瞻禮任汝想憶何因而至樂已云極事事皆足王宮何異晝夜思來實應慚恥年既風燭寧無恐懼一朝臥疾百苦交逼眼光掩卻方悔晚矣淨念不純被業牽去此生不了曠劫難避欲脫輪迴及時努勵彌陀在望時未忘伊汝何不念剋酬慈意但得一心迷悟休擬忽然觸著彌陀即汝若了惟心淨土在此生即無生去亦奚去倘未契悟且向蓮池同居彌陀為汝指示豁然解了生佛者是策鼎湖眾職事夫為職事本是輔翼叢林供養佛法僧寶成辦所修自利利他之務故須盡心竭力猶恐心之不盡力之未竭何可厭煩託事偷安至有所失彼此不備然供他即是供己各各成辦事業所以搬柴運水無非是道作用唯在當人豈可欣彼厭此憚勞自逸胡不見曹溪負舂雪峰司飯溈山典食徑山洗籌百丈不作不食壽昌終身力耕俱有榜樣悉成傳燈諸祖由斯觀之執勞服役殊非分外事也現前共住將二百眾而常住各職事每每缺人有力者即宜挺身向前奚當退縮私避除其不樂為佛為祖者吾末奈之何也矣策知客知客之職乃叢林之屬望主人之代履故須迎賓有禮接物和光毋存好惡謙下自卑出語必須柔和心地務宜慈愛至於款待豐儉隨時雖曰山蔬麤糲不失殷勤理亦無過凡有緇素客至倘有贈遺不可輕受始得公而無私遵佛遺制順古清規無忝厥職如或不然心懷怖愛情露瞋癡違律明誡自招愆咎察出決不輕恕策典座飯頭一飲一食乃檀越信心殷重為求福故割妻子分減自口腹以供眾僧誠如金屑易食難消若無修行未免披毛戴角酬還靜夜思來可不警心其為飯頭者固宜儉約不可浪廢儉則不奢約而有準觀眾多寡以設粥飯不得多剩致生三過一者暴賤信施二者虧損常住三者宿餿眾食不安粒米七斤可不畏之其典座者更宜檢點苟無護惜之心自招愆于長劫倘有偏私誰當代罪因果歷然豈容不懼慎之慎之策司鐘鼓凡鐘鼓犍稚之聲利益幽顯上根聞之立證圓通故佛敕擊鐘令阿難悟下根聞之三業肅清心意寂然故古人臨終之際遣人長鳴鐘磬以助正念鬼神聞之合掌敬禮幽途息苦地獄清涼昔寶誌公借武帝道眼見地獄苦相乃問曰何以止之公曰唯聞鐘磬聲其苦斬息遂敕天下寺院擊鐘須徐舒其聲又南唐高帝誤殺降民墮在獄中囑還甦人以奏嗣主令諸寺院鳴鐘須延其聲俾受苦人聞聲得暫休息由是觀之凡擊鐘時須細心輕手長延其聲餘音將盡方續後聲使幽途眾苦而長息洪音萬古而不竭即此便是救苦之大士昔莊嚴寺釋智興誠可鑒之智興載六道集五卷中策禪律學文字之始本乎伏羲氏畫八卦至五帝文而詳矣皆以聖教化民淳朴之風存焉迨至周衰淳朴之風凋散而孔子刪詩定樂以易道教人契自本性未嘗攻詩詞歌賦及至漢晉稍興詩賦之盛莫若唐宋也釋氏之教始自漢明至于晉宋齊梁皆以實學教人與儒道併化嗣後人多于佛經目為文字道理知解由是生焉知解生悟門絕故鼻祖初來掃卻文字示以直指見性之宗二祖嗣其旨皆以文字為糟粕使人默契心源不落語言文字知解是為佛祖直指之宗自唐宋五代至元皆純金朴玉祖祖相傳不悖佛祖之宗明初亦不異先朝俱禪律並行明代將末禪律陵夷人多怠惰不遵佛制自號宗門不拘小節放縱自恣食無晝夜過午飽餐違佛明制茲不但孔門失子淳儒即釋門亦失于真僧矣嗚呼法之末矣豎拳豎拂遍滿大地誠非釋門盛事吾憂其為釋門之衰相耳其有智者當念如來臨涅槃之際諄諄誨囑俾依木叉為師始不媿為佛弟子者也尺牘與嚴清江伯世間事業居士幹辦已極出世機緣當求有大了徹為金粟再世攝化同事無負此生昂昂丈夫向索拄杖衲舉有拄杖與拄杖無拄杖奪拄杖之句曾力參實究否此非慳吝拄杖借句搪塞確欲居士了明親送拄杖來也別後懷思惟此便風勒布亦惟於此冀我拄杖得蚤出山為快與佟六孩居士天下第一等人堪肩第一等事所謂第一等事者功名富貴固非其業即道德文章亦非其具是當人無量劫來生死之一大事此事當明甚於饑渴而人莫之顧問最可悲痛者厚植般若緣者時能頓覺悔悟為遲若居士者真是頓覺天下之第一等人也故乃有昨來猛擔荷衲喜不勝今暫歸山他時定出相訪出家人不妄語也詩扇一握非為芹敬蓋以作箇念頭令記憶不忘耳與李友三學憲春澤既深物生日茂即天文之觀是人文之所化成者也故文章為天下之生氣唐虞誕敷文教達天下之生氣也生氣牿亡天下斯講武而尟文今中興文教寄於居士寄天下之生於居士也生天下之福其福無量得為居士賀但文是生而非所以生者所以生其性命之修乎修性命之學實惟釋氏而得其傳於諸黌宮肯賜表彰釋學一二則天下性命修天下文章無不煥矣居士真不負天子寄託而得其大生天下者矣辱在法契之所當饒舌者故用具陳與陸義山中翰鳳翥南來五嶺為之彩溢貧道固深居窮谷亦知景仰天人第自慚疏野未易摳瞻光霽耳暑月辱承大作金扇正捧誦間不覺仁風涼徹又何啻廬山寒瀑覿面飄飛乎居士般若根深不忘靈山付囑獨不知聞樨香公案曾對幾長老舉揚否台旌未云北指倘獲枉顧荒山傾論林竹與有欣輝焉嘉惠疊頒感戢無已率此鳴謝臨楮無任瞻溯不宣與侯商丘伯藉緣圖悟猶有玄慕佛山得面未肯泛常置之故和尊韻成偈存為法門佳話曾在錄呈想博笑覽矣人世福位功業於居士已備復少何事所少者衣線下一件大事耳伏願一切時中提句話頭究此件大事於生死去來絲毫不昧若古龐老之參馬大師張無盡之嗣兜率悅殊絕為何如哉不勝祈仰與梁同菴孝廉四大本空五蘊非我誰為病者倘能於此當下覷破則四百四峰一時摧落獲大自在方知病乃修行者之良藥也斯時正可將日前所得工夫一一驗過中有得力的便可向前進步如或用不著即須徹底掀卻從頭做過取箇灑落處始不負居士向人開口自肯也與吳幼更孝廉去歲一晤便知居士是世間挺特丈夫蓋世知見者第於出世丈夫未立出世知見未證若真挺特漢子當須趁時決取證入即世出世間丈夫知見俱備斯為真實挺特者矣雖然如是還要做到不丈夫不知見不挺特無可名不可似是世間非世間是出世間非出世間瞻之不得其形覓之不得其蹤閻羅老子到此求禮一場懡㦬諸聖欲與說法不能吐舌何生死去來而不自由者哉如或不然未免有喫閻羅老子鐵棒日在又豈能脫其驢胎馬腹者乎同菴卓金二公實世間伶俐丈夫但惜其不遇作家鉗鎚手眼剝卻伶俐知見脫皮換骨一番故至今日總沒交涉去矣光陰不住居士好著眼看道人無可相遺唯此奉贈勿嫌不中口味反生呵責今時雖用不著他日或如不龜手藥者有之矣復吳幼更孝廉來諭盡屬心識卜度知見知見立知即無明本縱饒說得是亦是名言名言不到法身邊俟公心思路絕咽喉塞斷時方來與公說其後臨終預前數日屏絕妻子獨處一室端坐而逝與徐伯昌文學世事如夢在夢非無種種事物學道人如從夢醒既醒不可復執夢事為實所謂在寐做夢猶可最怕醒眼作夢寐夢終有醒時醒夢了無覺日居士宜將慧目於此觀之自然塵勞解脫暢快平生與徐聖甫明經不晤久時想必別有一段風光透漏雖然如是還要徹底生輝始得不被電光閃爍錯認定盤星也衲去冬下山路冒風雨遂為病困不獲面言今憩錫鳳城註刊又為法絆明春獲暇徑向丈門搖錫勿謂黃面比丘闖至原是過勘老婆子之行腳僧耳渠祖母久歸依師深究壇經年將八十篤志彌切與陶智量老優婆夷徐伯昌母年將入十長齋三十餘載俗言不涉于口出語皆文可謂女中丈夫矣三界唯心萬法惟識識空則萬象湛然心寂則六道斯滅一念纔生百千塵勞相續不斷是故諸修行人不成聖道皆由識心障礙故佛示種種法門令之解脫愚智共修男婦同學者無過念佛一門是以念念彌陀六道自寂心心淨土寂光昭然爾年既老矣信向修行亦有日矣斯時正好放下緣慮絲毫勿罣著力向前如上急水灘頭得力惟在後篙猶遠行人入門只在末步後篙若緩前篙盡廢漂流從此為始末步苟遲千里無用永為伶俜之客家鄉此失何日云歸將此啟勸安心淨土注念彌陀眼底既無寸土胸中何有子孫秪要世念解脫莫憂淨心不純解脫即彌陀現前貪著便六道穗生美惡自知不勞老人多說老人此去未審何時下山苟能念念彌陀不輟老人時時在目所言三界唯心萬法惟識此之謂也與曹俊仲工部世交乍親而久疏出世交初淡而終厚初之淡也將有擇焉終之厚也漸而進焉非若世交乍親以利而久疏則怨也要其始一本自利之心一本利人之志無自利而利人初必為厚終必為淡而衲與居士亦既見矣初何其淡而今不其厚乎所以為厚則志居士契佛理功名是假事毋太認真生死是大事毋當兒戲欲得不迷於生死其急學佛法乎佛法多門學之有要生從何來死從何去朝夕勤勤研究於此則得契佛理之要矣風便具勒意甚懸切毋曰臥雲野漢說沒要緊話也與李文之居士夏初得接清光本昔緣之有在知居士日課金剛般若衲為如來使者得以金剛要義為居士言之夫金剛般若金剛何在居士日用中遇色見色遇聲聞聲此能見能聞者曾為聲色所損壞否若有損壞則見聞損於前之聲色後之聲色無復得見聞矣惟無所損壞故隨聲隨色無不見不聞也此無所損壞者即是金剛幸居士當前識取然既當前識取矣則父母未生前一口氣不來後此識取者放在何處參之參之與鍾恒璞近事學道人須要真誠虛心為本寡慾為先晝三夜三彌陀不輟心口晨昏頭膝不離於地以彌陀為父芙蕖為母淨土為自家鄉娑婆是暫僑舍所有家業猶如桎梏現前妻妾視之如清淨海眾他日方能向八功德池中洗濯四色華裏跏趺若癡心不了日過一日光陰不與人期忽爾無常到來不免閻羅老子階前下跪如此時節欲求一禮一念不可復得爾時勿怨老人不為公說破老人畏此故為預啟莫謂他日放下然後總修只恐時不待人宜須逐日努力幹辦方會打算勿俟倉虛下種難救目前饑急倘不嫌老人所說他日彌陀為公授記與馬來若居士自一見面便意子從般若中來必為出塵之士至今竟汩汩為世緣中人非道人之眼不明則子之情欲心重不顧蜜中毒泥裡刺現前百年如駒過隙當來三途苦報拂石難窮宜靜思之況子孝人也夫為至孝無過立身行道以報親恩親既往矣何暇於塵勞世上挈挈波波終日為他忙忙拖泥帶水何日云休一朝無常到來如落湯蟛蟹相似若真丈夫漢子急宜秉起金剛眼觀此四大之身如癰如蛆如幻如化身尚不可得況身外之妻子田園產業者乎回頭澄目一看空花自落夢幻斯消然此一看即成佛作祖亦憑之也不可將此以為等閒平常故事此時錯過他日難逢切思切思與斐然宋都統山僧與居士一期機契誠非偶然今大駕奉旨移師將有千山之隔後晤未時曾記古云富者贈人以財仁者贈人以言今山僧愧無財可贈秪有一語奉勸諒高明必不見訝所謂居士夙具善因今生報得尊貴之位既位居尊貴則威怒易興群下莫敢當其鋒者獨不知群下亦天地間從父母所出不過欠些福力若論輪迴果報則貴賤賢愚似未可一定也倘處高能慈忍則其德莫大焉故山僧特敢勸居士常當慈愛仁物也又凡尊貴者多荒酒色不知酒色二端實敗德損身之器今居士欲期聖道當於酒色二端常加戒慎若此不疏欲期聖道者恐難為說矣至於隨緣修福如造寺齋僧興隆佛法等尤宜著意勇為以此良因能令人生生世世中受人天勝樂殊報山僧於居士愛過故不意率此逆耳惟明察而行幸甚與吳東三宗伯衲錫端時居士勞國而不遑家尚圖終日之談竟不可得聞今續有家矣則出而謀國入而教家懷想忙狀無不為之悚畏者雖然古德有言從內打出者其力強從外打入者其力弱衲輩原為弱力懦夫故外塵勞而打入焉居士氣魄精神學識才膽色色過人從塵勞內打出是其本事但向忙時急切捕覷未可暫置昔人承教知識急切處提撕一日登廁因聞臭氣忙掩手不及遂獲捉敗鼻孔者些消息非是學見識揣度得來者唯居士念之與並賢道人洪西嚴少宰夫人夫人以女身而志參究期了生死大事可謂具丈夫智矣又知現前身子安頓無處但說諸法空為不濟事可謂具丈夫智之聰慧者矣參究若不實實得此身子有箇放下處說有悟門果是假話夫人既具此見不愁他日得悟不真實也但時時提句誰字話頭捱拶將去有日將他挨倒自得真實悟門自得身子放下處今當說者夫人志參究了生死者為學道也學道者學佛也佛何道度眾生也夫人一發學道之心即當知度眾生為事度眾生不必捨近求遠環對夫人之身丈夫兒女婢僕之屬即眾生也事夫以敬勿有以發其瞋心即是度丈夫之眾生也教子以義勿有以長其癡性即是度男女之眾生也禦下以恩勿有以起其怨恨即是度奴婢之眾生也至於嚴內外婦人衣裾之物不暴露中堂令往來者服我夫子齊家之有教即是度外來之眾生也若捨眾生不度而求參究了生死此便是知頭而不知尾有乖佛道也故為夫人言之又見先佛世尊教化在家優婆塞優婆夷多此等語今夫人及夫主既資道人受優婆塞優婆夷戒是道人所當教化者故如佛而教化之勿以為異與林直衢居士面隔周除時如瞬息未審比來道念情念優劣何如莫謂妄本真如奚優奚劣如此非但認賊作子元是箇混沌禪婆何名禪家子弟必是碧眼胡兒自然還他真偽於此檢點得出方許無第二人具大信者須具大慧以慧觀察始不自昧而亦不受他瞞切忌本自現成何勞頭上安頭之說與玄翎菴主夫欲修行先須厭世人命無常口氣不來前路茫茫不知何往未離三毒必墜三途淨念不純何能往生極樂是為袈裟腳下失卻人身自當痛念生死精勤行道動靜不離彌陀心心念歸極樂此身尚當深生厭離何況身外之物口勿談世事心不涉俗緣非賢不友非聖不宗幸勿我是他非亂自心源徒眾少畜世利莫貪煩惱無明必定要除貪瞋邪見不可安在胸中既是好心出家當聽吾言如或不信他日勿怨老人不為你說與曾續慈清士聞子失孫生大憂惱然子今失正念老人憂惱尤甚以子不自覺空花而作實想空花本由瞖生瞖若無時花將奚在故曰境因心生心若無生境亦不有又夫有生必滅有聚必散愛別離苦子寧不知苟實不知則學道俱成水月矣倘實知之而故作小兒戲可一大胡盧也若是智人應以智眼觀此生滅別離之境縱不能入無生而亦增一分道意豈不見龐居士被女靈照奪先而逝居士即呵呵而隨之坐脫龐公手段固子無有而反生愁惱自失正念取笑旁觀速宜知省好與西來山朱玉翠眾居士鼎湖與白象林相去不千里屢擬買棹還山竟為事緣淹滯頻年虛約其過深矣然非厚彼薄此蓋實葛藤未了惟有道者能諒之耳今夏閒能閒當即料理歸帆與眾居士坐松風談水月此時不得說實相無色貌真言有義路也與尚世明副戎昨接名言語投針芥信非夙緣所至莫能有此且承飽我香飯至今毛孔馥郁未已獨不識末法鮮慧比丘何以報德耳雖然自愧慧鮮猶喜具些肉眼見遍界人雞鳴昏夜名利填胸放恣六情奔逐塵境未嘗返照知非以釋重擔又不知現前念生念滅即是當來生死種子流轉三界根株居士夙植福慧靈根迅發不受物欲所惑不被阿師所瞞是超群拔萃挺特丈夫矣然向上一事雖人人有分而機有大小敏鈍功有死活延速悟有時節因緣今居士具大根利器須在活路上著足凡舉心觸目當下即要討箇明白不可放過看渠渠是誰畢竟是何物倘有會處切勿便作聖解恐是暫時岐路況悟有淺深邪正難分所以古人教人立在轉處勿死一路方得活潑潑地一日因緣時至便階大自在無疑之地斯時順風唾去咸是妙用信手拈來無非丈六金身又何生死之可了三界之可出噫婆心沙門不覺卒此醜陋幸為一皆掃卻感謝感謝與昂溪大師空王風化與法兄同歸獦獠家鄉與法兄同出自天湖判袂後唯向別峰相見耳頃聞法兄修行不密被人天子見知此又因緣不偶視弟才如枯櫟跡類閒雲則相去天壤矣數年因忞著佛祖葛藤未遑修候殊抱歉然何時移錫桑梓俾弟得以面教幸何如之拙刻呈覽臨楮瞻溯不宣與何象宣清士昨一書邀子到山共話林泉久望不至將無道心有所退步乎抑無竟為俗緣所羇絆乎二者皆非慕道人所宜也然處家世事雖云不無而不可全身坐在其中甘為火宅中人必須從火裏發出蓮花方是居家佛子日月如箭轉息即是來生心識既被世事所昏何能定其生方人身若失三途難免豈不辜子在佛門走一遭耶須知世間乃夢幻境界此身尚是棄物況其身外所有者耶速當著眼看破早歇世俗任馳即此便是入道階徑他日方保子有歸家日在不然千生萬劫猶為貧苦僑客也與何壬生明經別來多歲知居士必植無限福因第慮於自心自性想未有箇入處然居士自童年歸依老人實乘宿緣感發天性自然然非慕玄微而稽首于北無乃求福壽之所至故老人向來皆以平淡話奉勸曾未與一滋味言相益斯非道人之咎實知居士未識三界火宅人生夢幻五欲淤泥埋盡世間多少伶俐漢子百年之後竟作何如唯隨業識升沉誠難保免淪墜人生百歲福鮮業多即一日中造福無幾慕善可知殺生忿嫉婬欲愛染驕奢人我貪名邀譽縱蕩身心慳惜分文唯知己有豈念他乏只曉自樂寧知他苦如此校之十二時中善如毫芒業乃難紀所以輪迴三界者皆由不善業識業識不斷生死牽連故云一失人身萬劫難復其有欲斷牽連者唯秉起金剛王寶劍此劍即吾人現前般若妙智能斷無明業識種子能趣涅槃彼岸若真丈夫下刀即要見血業識命根若斷方來與老人一驗何如與博山穎學禪師自贛州與老兄及羅峰兄聚首團樂此時相得歡甚不知俱在化城中判袂以來忽忽將三十餘年往矣固聞問雖疏而別峰相見曾不隔于纖塵今夏機上座來知老兄法席日隆慶甚快甚弟恨碌碌庸不能振奮開化一方為父祖出氣深自愧恧乃欲覓一荒山活埋無那頂湖雞肋不獲自由想老兄天耳聞之不大胡盧絕倒乎與華山見月律師佛日垂暮魔風久扇老兄從菩薩誓中來扶揚律學啟人天之覺路為一代之作家蓋弟景欽有年每以未獲披晤為歉豈其分緣之獨慳耶弟年來著得律釋二部共五十餘卷其中麤明律旨誠堪為後學指南道兄宴寂之餘不妨一鑒及也與江景升總戎別教瞬息數年矣川嶺迢迢魚鴈荒疏想大作用人一片仁心為國為民自應隨時納福不煩貧道贅祝可知獨聚首劇談不知為何日在耳向承寶幡見壽足仞雅情謝謝茲類隨比丘來便勒一言詢候倘或明春興到摳衣庭階未可期也世諦空花有身皆幻唯勤猛省深入道是禱與曉湘李宗伯老居士現宰官身而說法遠近爭傳貧道固深居巖谷而披沐遐風亦云久矣前載接教雄談臭辯不啻淨名別後還山而未嘗不憶居士得心無礙應物自由也啟者先師歸寂眾弟子輩議塔全身於本山茲欲得居士揮撰塔銘增飭輪相惟老居士與先師針芥莫逆必不慳此數行珠玉為先師揭露光明于不朽也萬惟鼎諾則不但貧道與諸子感荷即先師圓寂照中亦欣慶無量矣音釋諛音于諂諛黐音癡膠黏鳥獸餿同𩜯音搜飯壞也犍稚稚訛作椎凡木石銅鐵打能鳴者名曰犍稚僑音橋旅寓之居捱音涯延捱又拒也拶音贊入聲逼拶也挨音矮平聲推也三毒貪瞋癡三途畜生餓鬼地獄涅槃此云圓寂如來萬德已備名圓諸障永盡名寂木叉梵語具云波羅提木叉此云保解脫即戒也謂保任持戒者解脫生死也今人謂持戒為執著是則不執著生死不得解脫也豈不見古知識午後過訪惟煎橘皮湯款敘何曾別設飲食又宋楊億清規序云齋粥二時均遍表法食雙運也是知古之叢林無一不遵佛戒律也訝牙去聲疑怪也四百四峰身之地水火風四大一大有百一病生四大共有四百四病也闖或作覘窺覘也覷音娶伺視倘應作儻今隨俗作倘伶俐應作靈利今隨俗作伶俐使易曉苐應作第今隨俗作苐瞞應作謾音滿平聲今隨俗作瞞三業身口意六根眼耳鼻舌身意六塵色聲香味觸法分衛即乞食也六度即六波羅蜜一布施二持戒三忍辱四精進五釋定六智慧是為六波羅蜜以自度度他故云六度八萬四千相謂阿彌陀佛身具八萬四千相好也過午正言過中午有八刻前四刻名時後四刻名非時不得噉嚼律云日過西一線即名非時凡出家受佛十戒二百五十大戒皆制不得非時噉嚼今以食噉無時者自號宗門而以非時食噉為宗門阿誰不會但不敢逆佛違律耳然宗門亦受佛二百五十戒除其不受佛戒即無犯戒罪也雲棲大師竹窗二筆云越地安禪夜作齋其名曰放參飯競為侈靡勝於午齋相沿成習久矣昔有尊宿聞鄰房僧午後作食不覺泣下悲佛法之陵夷也故僧禁過午食況夜食耶律言人間碗缽作聲餓鬼咽中起火乃於漏深人靜而砧几盤盂音響徹其耳根又煎煮烹炮馨香發其鼻識忘慈悲之訓恣口腹之欲於心安乎況持過午者午後至明不食纖物我等晚有藥石何不知足之甚藥石謂八種果汁及薑椒蜜石蜜也唐釋智燈恒持金剛般若勤不知倦貞元中遇疾而死弟子啟手猶熱不即入木經七日還穌云初見冥中若王者以念經故合掌降階因問訊曰更容上人十年在世勉出生死因問人間眾僧日中後食薏苡仁為藥食還是已否王曰此大違本教燈報云律中有正非正開遮之條如何王曰此乃後人加之非佛意也遠近聞之諸客僧至乃至有中後不飲水者智者睹此自當警之弟子正雪等奉資敬刻剩稿一卷四恩總報六道咸資與諸有情生極樂國康熙癸亥孟夏吉旦識弟子等融等捐資奉刻剩稿第二卷不墮三途八難生死永離得生極樂成等正覺康熙癸亥孟秋吉旦識
