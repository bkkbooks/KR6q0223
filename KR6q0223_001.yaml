body:
  text: 侍者開溈録開示碧江諸檀越請往開示心經師升座講經題至照見五蘊皆空度一切苦厄訖時人衆哄鬧聽者難聞乃略示云當知菩薩所修不同名號亦別從眼根修證故照見五蘊皆空得觀自在名從耳根悟入故初於聞中入流亡所得觀世音名大衆欲識觀自在菩薩照見五蘊皆空麼即豎起如意復云大衆欲得觀世音菩薩入流忘所麼喝一喝便下座莞邑金繩禪院請師説戒師拈香祝聖訖據座示云善男子諸佛世尊本為一大事因緣故出現於世所謂開佛知見示佛知見悟佛知見入佛知見故説無量法門八萬修多羅藏法門雖復衆多而總歸三學所謂戒定慧也然慧由定發定藉戒生是知戒為三學之首萬善之基衆聖因茲而趣菩提諸佛從斯而成正覺所以欲得無上妙道須當至誠而稟受之示己次第為諸緇素受戒乙巳結夏安居示衆原安居一法有事有理言事則三月九旬之中身不出界外宿即名安居言理則有大乘小乘大乘以大圓覺為自境界若心念世事即名破安居身雖出界心存鏡智不名破夏所以文殊三處度夏不名破安居以文殊於大圓覺中未曾動著一步也其小乘以身受心法四念處為自境界若心離念處即名出界而思世間財色名食睡即被五欲魔之所纏縛雖不名破安居而煩惱結使瘡疣未除九旬誠為虛度如昔有一比丘依樹下安居忽然一念思惟世事樹神語言比丘何以生大毒瘡比丘聞已即自責心悔過神言比丘善自塗瘡矣比丘復住四念處神言比丘瘡已瘥矣所以一念才生鬼神得而知之豈有心念俗事而不遠離賢聖還得與淨行者同居乎今有修念佛者即以六字洪名為自境界若心離六字即名破安居其參禪者當以一箇話頭為自境界若離話頭即名破夏故云暫時不在如同死人寧有心思五欲而不破夏者乎苟不遵事依理則有名無實不免於三月中有徒喪光陰虛度九旬之責也除夕示衆今乃臘月除夕諸方叢林規矩各各不同或有歌曲戲舞或有説法豎義今夕鼎湖也不歌舞亦不説法畢竟作箇甚麼者裡須是箇仙陀婆漢始得會麼良久云若也不會當別與大衆説箇𡓍雜話也罷若言𡓍雜則諸人滿腹皆是又何須山僧説乎倘言我無𡓍雜不但慧眼不明實自昧多矣今不妨為衆拈出何如何為𡓍雜所謂三毒十惡八萬四千塵勞妄想塵沙諸惑是也然八萬四千皆由十惡而有十惡本三毒而生言十惡者身三殺盜淫口四妄言綺語兩舌惡口意三貪瞋癡云何名殺非謂不害人命而飛禽走獸蜎飛蠕動俱稟識心心無大小惟形類不同耳既心無大小則上自諸佛下至六道衆生同一覺性如有傷害即是殺未來諸佛也云何名盜非謂偷他七寶資財但非己有而起貪心即是盜矣云何名淫非謂干犯他人男女乃至不淨心生思念前境即是之也云何名妄言謂未證聖自言證聖未悟道自謂悟道未得禪定言得禪定乃至言見神見鬼等名大妄言與殺盜淫罪同科不通懺悔也云何名綺語謂種種裝飭虛浮不實之詞惑亂人心也云何名兩舌謂向此説彼面是背非令人虛生憎愛也云何名惡口謂口出粗言罵詈於人痛如刀割也云何名貪謂貪愛五欲財色名食睡又眼貪好色耳貪妙音鼻貪香氣舌貪珍味身貪細滑意貪一切快樂諸法也云何名瞋謂於違逆之境煩惱忿起瞋火滿胸不思有理無理只見己是他非吐惡毒言兩目瞋視不顧師長朋友上中下座縱曾沾恩叨澤悉皆忘卻只欲己勝豈念陷他云何名癡所謂愚癡倒見無有慧目不鑒是非於三教中不能分別是法非法此世間法此出世間法於如來三藏十二分經何者是大乘何者是小乘何為性宗何為相宗何名有宗何名空宗云何權教云何實教何等了義教何等不了義教於此不能決擇分別即失趣向縱饒勤苦精進不免盲修瞎練月往年來無常忽到孤負一生錯足一踏即陷墜深淵千生萬劫沒有出頭如此𡓍雜若多若自須一一檢過不可因循自欺自瞞生死關頭業識種子此便是也成佛作祖亦不外於此矣故溈山云一念頓悟自理猶有無始曠劫習氣未能頓淨須教渠淨除現業流識即是修也不可別有法教渠修行趣向何名現業三毒十惡是也何名流識八萬四千塵勞妄想是也即如吾人心中念生念滅之妄識如水迅流使人不自覺知若無慧目尚不見其生滅起止何能窺其迅流面目一念起即名為生一念滅即名為死生死不停長劫流轉此之種子若不急除則生死無汝出分雖然不能頓除必須漸漸去離故經云理須頓悟事要漸除既云頓悟漸除況其未悟者所以古人悟後水邊林下正為操履此事若能除得一分則便去其一分生死乃還其一分米錢諸仁者請自檢點看曾除得幾分倘全未除則今晚閻羅老子與你打算算到口氣不來日子盡須一一還他噫各自請回打點去休將瞌睡錯時光仙陀婆一名四實惟有智臣能知謂鹽馬水劍丁未夏安居示衆六根淨攝身心晏然名之曰安誓此九旬足不越界名之曰居然一歲四季何以但夏三月結制安居據律教中如來為三事故制夏安居一為雨盛炎熱比丘自當禁足三月勉勵策進身心不得一切時人間遊行妨修道業二為夏時多諸蟲蟻舉足動步莫非傷損比丘原修慈行護生為本無事不得遊行三為遮諸誹謗以比丘違前二事招世譏嫌由此故制夏安居也若據宗門護生須用殺殺盡始安居喚何者為生所謂三毒之魔六根之賊情識知見苟不剿除為魔賊所縛終不能解脫獲大自在何得名為安居若山僧則不然何也盡大地覓一衆生了不可得何有生之可護自無始來寸步也未出門何處人間遊行從頭至足中間不見有我何人受彼譏謗三毒六根之魔賊本是妙明中家具如指不觸指空不礙空且向甚麼處下手而言殺盡始安居良久曰大衆會麼若能於此薦得則安居已竟如或不然且各歸寮對首受法去除夕示衆今是臘月三十日在家者公私匆逼債主填門出家者閻羅老子打算飯錢諸仁者請自籌量看曾還卻多少也未若還他飯錢不得一飲一食一絲一縷名為負債受用若分文不欠方名無事道人亦名解脫大士除此之外還有還得飯錢者麼唯有參禪與念佛二種暫延債主然參禪的二六時中把箇話頭放在面前念念發起疑情如紅爐大冶觸物皆燒所謂魔來也殺佛來也殺既然凡聖不立生死又向何處安排縱然閻羅老子到此且顧眉毛不暇又何敢與你打算飯錢念佛的行住坐臥把一句彌阤安著胸中念念不忘休云西方淨土有箇彌陀然淨土不離你心你之自性即是彌陀諸仁者欲見彌陀麼請自回眸一看良久云見麼凡所有相皆是虛妄若見諸相非相即見如來苟於此見得飯錢還畢如或不然請自尊重去明朝當刮目來相會也己酉安居示衆六賊不侵自境曰安六根不躡他界曰居若才出父祖門庭即被他擒攫不居陰界法身獨露若不如是且自努力各進己業參禪者舉起話頭疑情現前便當深錐痛劄如下刀刃即要見血念佛者放下萬慮堅持六字洪名如輪環轉無令彈指間歇即得淨念相繫看律者須達止持作犯名種性相信如來言勿順庸鄙吉羅無虧結使自消看經者洞明性相宗趣研窮法理契悟無生餘此之外隨力隨能執役勞務供養佛法僧三寶自然福至心靈入道無艱所謂二嚴備足方證菩提苟不遵教竊入法門避懶偷安虛沾信施是魔眷屬辜負出家徒名安居大失律旨非世尊意況人身難得正法難聞宜加精進祈超三有又今末劫衆生福輕業重自應晨昏夙夜勤行禮拜懺悔一消罪纍二長菩提三為成佛種子毋致袈裟下失卻人身悔之不及今老人雖不常在山中如能依法奉行即在吾邊倘不依言雖共同住亦去吾千里矣宜各勉旃七月望日自恣示衆今晨是佛歡喜日云何名佛歡喜蓋佛于二事中而生歡喜一衆僧自恣於見聞疑三事任他舉發有過則如法懺悔故佛歡喜二於三月中精進行道或階四果三賢十地或增益戒定慧學故佛歡喜今日看將來佛必不為我等歡喜而為我等攢眉何也其有罪者自不發露懺悔除愆縱有見聞疑而畏他瞋怒不敢舉發則於自恣名體俱不相當故佛為之攢眉今日於四道果無所得於三賢十聖位無所證於三無漏學無所增勝好生慚愧何謂於三無漏學無所增勝戒以對治煩惱惑為義煩惱雖多約有二種一根本二隨眠今當自揣曾持何戒而除何惑若檢點不出是則於戒懵然奚能增勝定謂四禪八定諸三昧門今當自忖看已曾證得何等三昧禪定苟無所證則慧學無因矣慧以破惑為義敢問已破何惑而證人空智曾破何惑而證法空智若非如此徒喪光陰倘以識兄妄生邪解謂本自現成何修何證則䧄墮在邇是則三學無分聖道匪階自負己靈寧無畏懼哉除夕示衆諸仁者現前有一物且問諸人知不知老僧仔細看來四面不相似言其大非丈尺可窮言其小非權衡能定欲名名不得欲説説不出若云仰之彌高鑽之彌堅瞻之在前忽焉在後總是捕風捉影漢若云豫欲無言無言即是言矣且輸他維摩老子一著已何也在昔維摩居士示疾於毗耶丈室彼時文殊大士與五十餘位菩薩并諸賢聖同往問疾維摩乃問諸仁者何者是不二法門諸大士既各各自呈所得後問文殊菩薩文殊云我於無言無説無示無識離諸問答為不二法門文殊卻問居士以何為不二法門維摩默然無言維摩敗缺且置若是老僧當時在會即拂袖而出免使在會賢聖一場懡㦬老僧今夕欲吩咐木橛為諸人説破又恐煩及于他不如各各放下休歇身心即自見自知如啞子喫黃連始信老僧今夕言不欺也元旦示衆師云老僧昨除夕所示現前有一物四面看來不相似你等諸人不以為意不向此討箇明白畢竟似箇什麼老僧今日不惜舌頭為諸兄弟下箇注腳所謂不似佛不似祖不似人不似馬你等若能於此不似中端的箇落處方有修行話分亦可以了生死不然生死到來道眼不明便被生死拘繫墮落三塗無有出期也你等諸人若有能端的得可出來試道看首座出云某甲截舌有分師曰猶須更道始得座云待某甲有口即道師曰敗缺了也座云和尚也有一半在師曰放你三十棒座云謝師可棒師曰首座且置你等諸人又作麼生當下便要取決方為好心出家亦不孤負老僧恁麼不惜眉毛為你掉盡婆心諸兄弟既不能出來道取一句老僧今更以方便為諸兄弟別説箇摩訶般若波羅蜜話令你等修行知箇趣向只如者箇般若波羅蜜覷之即瞎擬之即死向前則喪身失命退後即墮坑落塹你等人人有此波羅蜜老僧亦有此波羅蜜三世諸佛亦有此波羅蜜只是諸佛能善解受用你等不解受用你諸兄弟既知自有便應自保重不可向外妄生愛惡見諸佛便生敬愛見衆生有不順己情便生憎嫌違此則不達凡聖平等之法一切衆生既有即是佛也若知衆生是佛憎嫌何由得起諸兄弟今後切須保重自己者箇波羅蜜勿於衆生有分別異見始得免不輕他咎所以我釋迦世尊因地時為常不輕菩薩每見四衆人等俱禮拜稱云我不輕於汝等汝等皆當作佛彼時四衆惡口罵詈云我等不用汝虛妄授記爾時菩薩不生瞋恚仍向前禮拜諸兄弟看他是何等謙卑忍辱蓋因他信得衆生確確是佛自信信他自保保他故能行此難行希有之事老僧也願諸兄弟及早克念以此菩薩為師為鑑自信自保始有脫離生死日在庚戌夏安居示衆大衆安居既竟須當勤策身心所謂幻事場中一法不捨金色門頭一塵不立不立一塵如大冶洪爐相似不捨一法即六度萬行空花佛事皆悉隨作倘若錯過再遇難逢若以枯木禪為一塵不立則未免他日野狐身在諸兄弟可向事事無礙中做去則自他兼濟福智日新始不孤今夏中三月資益者也和尚五十一誕前示衆某命生不辰出值末劫根鈍識暗福薄慧淺上乏德以酬四恩下無法以資群有既生無能有益於世死復何顏以見佛祖曉夜思忖淚沾簟枕茲屆母難之晨益加愧切食息尚不能少安又何面目與衆慶誕知我者為祝先靈早登上界三途有情頓息苦輪勿效世俗設齋辦供增我慚顏添我痛結足感厚德更祈衆兄弟挺身向前各出手眼努力衛持佛法匡護父祖門庭放我骸骨歸于巖壑得與清風為伴明月同倫則肝膽塗地亦未能報君於萬一矣斐然宋元戎初入法門求示修心法要經云人身難得佛法難聞難得而居士得之難聞而居士聞之既聞之則當著力求進以步躋堂奧而受用無盡矣但進趣之方其路不一若近世所遵尚者唯參禪念佛二門禪謂直指人心見性成佛即達磨祖師所遞相傳授者昔古人於一言半句下洞明心地與諸佛祖同一口氣無二無別後人根機稍鈍不能於言下契悟故古人不得已而示以一言一句深參實究行住坐臥未嘗暫離以悟為則吃緊做去豁然疑情頓破則生死大事了當矣然此一門最玄最奧參者難得其妙多墮情識光影坑中埋卻不少必須要依明眼善知識時刻提撕始不錯認石火電光為自己也念佛一門謂衆生不聞佛名不見佛性沉淪生死海中無解脫期故如來愍之教令念佛以稱佛名滅卻無邊生死之罪如其心心念佛即心心是佛不假方便自心便是淨土自性即是彌陀捨此虛幻報身直趣極樂世界親睹彌陀至成正覺今居士夙植靈根雖處塵勞而不為塵勞所惑知有三世輪回欲求出生死之法必須於如上二種法門深進共一若要念佛當將一句彌陀名號惕於心中六字歷歷分明猶如連珠不使間斷設有妄念倏起即須早覺還續前念不可隨妄想境遷流無有底止日久月深自然淳熟便證念佛三昧縱未證三昧現獲三種利益一者經云念佛一聲滅卻八萬四千億劫生死重罪二者蒙佛大悲願力攝受經云若有衆生持我名號我當接引其人來生我國三者此心刻刻妄想扳緣即是流轉世間之因當來必招六道生死之果若一稱佛號即此妄念變為佛心便是返本還源復自性佛矣若欲參禪者須看自己現前者一念妄想從何處生起滅向何處於二六時中刻刻尋究以必窺見為了手忽然一日覷破則歷劫塵勞生死種子一朝解脫矣然此必須把定正見切不可錯認目前光影亦不可將心穿鑿亦不得暗地湊泊直須發起勇猛精進驀直向前討箇落處以為究竟如是用心縱未開悟已種般若種子千生萬劫無泯此是初入法門捷徑工夫榜子唯居士明而鑒之辛亥和尚周甲誕晨緇素弟子設供張錦申祝和尚齋訖示云昔世尊降誕一手指天一手指地云天上天下惟吾獨尊後雲門禪師曰我當時若見一棒打殺與狗子吃了貴圖天下太平我某甲今日生茲末季前不睹釋迦老子開大慢言後不遇雲門老漢惡辣鉗鎚若遇惡辣鉗鎚今日便與黃面瞿曇出氣不致帶纍諸仁者跋涉而來華錦稱祝薄德山僧好生慚愧斯事且置只如知恩報恩一句又作麼生道良久云露柱打破石人頭辛亥除夕示衆今日除夕世云除舊布新我等釋子喚甚麼作舊甚麼作新詗首座出曰適和尚教除舊布新本來無物除箇甚麼布箇甚麼師曰只者箇甚麼也須除卻甚麼與不甚麼並皆掃蕩座曰從何處下手師喚曰開詗答諾師曰便好下手去座禮拜師良久曰古人道如牛過窗櫺蹄角通身俱已過了因甚麼尾巴過不得書記出云前後際斷中無一物牛與窗櫺俱不可得師曰未夢見在座曰如來禪許公有些子分記云只如首座又作麼生座曰好箇畜生被人賺向者裡走師曰依然未端的猶欠腦後一捶在座禮拜而退次早元旦座禮佛稽首才起忽腦迸香桌聲轟如雷不覺身心廓落即入方丈呈偈曰腦後一槌虛空迸裂四方八面絶遮欄大地山河齊漏泄牛尾巴親捉倒始信鳳凰兒不向那邊討師曰今日乃知吾不你欺誠不愧為博山兒孫也座曰承和尚記莂禮謝而退新正示衆今日獻歲初三世云彌勒世尊降誕芳晨既云彌勒降誕為甚麼不見現身説法聻詗首座出曰且喜説法已竟遂禮拜復立師曰你既肯承當為甚麼還自退讓座曰灼然無諱避處但曹洞家兒孫事應側立師曰老僧除夕示東山水牯牛公案次早你因緣時至腦迸香桌始知吾婆心徹困你既如是老僧亦不可放過遂擲拂子座手接得師曰東山一頭水牯兒腦後一槌奪卻尾大地山河無覓處原來落在者箇風顛漢手裏座即禮謝曰蒙和尚吩咐敬當奉持掃除魔佛以報不報之恩師下座歸方丈示晨昏課誦二時課誦是修行之要術出生死之靈符固不可得而簡略又豈可得而輕忽者哉晨諷楞嚴咒者淨除業障成就所修晚誦彌陀經者彰顯西方注想淨土次誦八十八佛洪名以滅罪之根源復修菩薩五悔普賢十願成就六度萬行回向淨土棲心寂光後加施食福利群生拔其劇苦令餐法味以獲解脫是則每日晨昏二時自利利他之行無間猶須於二六時中善用其心屏息諸緣不馳外境念念不忘始得所修圓備若夫情念不休妄心不了奔逐六塵如窮子逃逝忘返家念即晨昏課誦而成説路人何日云歸又況於課誦而不注心專誠者何異童蒙課三字經乎其中經文懺理未解者速當博問究明方為智者善懷要術而佩靈符乃不落童蒙之誚而自事成辦矣五悔者一衆罪皆懺悔二諸福盡隨喜三請佛功德四願成無上智五回向無上菩提示半月半月布薩佛制半月半月布薩為淨三業以潔六根有過者即當發露説悔其罪無犯者依法淨住以戒淨故煩惱結使因斯解脫未來生死種子從此凋謝故布薩翻為淨住由吉羅無犯乃名淨住亦名長養謂離諸罪障功德長養法身漸圓是以持戒為功德妙因獲證法身極果故經云如來三十二相無差別因皆由持戒而得又云戒即汝等大師若無戒者是則無師師既無矣奚名釋子而故違者即是逆師命叛師教既為脫生死出家豈可不遵如來聖制況今一衣一食皆藉如來白毫相光之福分及而不念報恩復加違教可乎又於半月半月在伽藍前不畏神明自欺心口可乎經云犯戒之人滴水難消伽藍淨地無容足處行則鬼拂其迹可不慎哉其有智者無論大戒非大戒自當時時防非止過有犯則發露悔過無則加勉故律云有二白法一者不犯二者設犯即能懺悔既許悔過還成白法烏可自覆而為黑業者乎能如律教修持是則世間良祐福田天人導師如佛言曰若山谷中有五清淨持戒比丘能令世間正法不滅可無自懷慶幸於波羅提木叉而不深生珍敬者哉示持齋齋乃仁術也大人君子之學非婦人女子之事也今人侈口腹之欲而惡言齋夫口腹之欲不可縱意孔門訓之詳矣孔子曰士志於道而恥惡衣惡食者未足與議也孟子曰飲食之人則人賤之矣許人縱口腹哉何學孔子之學以口腹小事而與孔訓相違不自知其非且謂齋之一字專於釋學不思子之所慎齋戰疾又曰齋必變食孔子曷嘗無齋也更若孟子之言則曰齋戒沐浴則可以事上帝事上帝者顧諟天之明命顧諟天之明命是帝王明德新民之學也非大人君子之學哉齋為婦人女子之事哉吾愧今之丈夫不及女子者多矣何也女子能齋是能操術於仁男子不能齋是乃絶術於仁仁人之生理也是所異禽獸之幾希者也可絶乎哉故人當急急乎齋也求乎仁也示分齋素師一日與二三子話示學道人貴腳下無絲始得去來自由時有高士雍容作禮問曰僕末俗愚夫未達圓頓之旨今始粗知歸向法門而於齋素尚懷疑惑竊見時人有食海參海蜥蠔蜆為齋者以為無血故無所妨豈其然乎師曰器世界中衆生亦殷充矣所謂胎卵溼化蠢動蜎飛俱稟識性咸知希生怖死食息苦樂與人無殊唯形質不同故血有赤白骨有內外白者如蠔蜆之屬外者如龜玳之類或依水陸而居或依虛空卉木而住盡名衆生蠔蜆等乃衆生之一耳若噉此為齋非我佛教之謂齋也士曰敢問齋義師曰齋之為言齊也齊身不殺盜淫齊口不妄言綺語兩舌惡口齊心不貪瞋邪見而履夫中道故佛制齊日中一食使不倚有無之偏邪而直處乎中道第一義中今人有身齋而口不齋口齋而心不齋者全乖中道也士曰中道云何措足師曰根塵不偶心體離念即名中道士曰初學鈍根罔諳進趣可有方便乎師曰念佛參究修觀三門隨履其一即是登中道之階梯士曰還用持齋否師曰豈不聞齊身口意耶齊身口意即名持戒若戒不持如人無足尚不能登躡階梯豈能窺其堂奧乎士曰今時持齋多不中食亦有益耶師曰古人云一日持齋天下殺生悉無己分安得無益若不中食但名斷葷持素不得名齋有違中道之義也士曰中道在心非在夫齋師曰心體無依理因事顯卻事言理如棄燭期明滅色求空猶不免邪見稠林況得中道第一義哉士踴躍禮謝曰非師指示幾沒邪途今承明誨雖殞身未足酬其萬一矣示緇素禮儀凡為共住之衆無論老少與久修近進者要須屏絶名利備修禮儀苟其名不捐則好譽惡訾日生而人我是非交集胸中廢德喪行自茲而始利不除則希得畏失而情馳外境交結往來狎近時深心行日濁愛欲貪恣蘊滿腹內污道忘修由是生焉儀不具則表乖僧體陋符庸俗人天失所宗仰志氣日虧僧寶從此漸替矣禮不修則失上恭下敬之誼見上忘尊見下缺慰不接待往來深違和敬之道至於稱呼應諾罔知尊卑之式準如律教上中下座彼此皆稱大德上座或喚下座字號下座或稱上座為長老尊者今依叢林規法彼此悉稱師父若稱檀越則云居士居士者以有才大富好談名言清淨自居之謂也或稱檀越理亦當焉古稱帝王皆云檀越檀者施也越者度也謂彼能行布施即能越度貧窮生死苦海也若老若少皆此稱之居士於僧亦當輕心敬仰何也凡為僧者皆稟如來出俗之教乃世外之士處一切人天之上首故帝王稱之為上人是以天帝釋每出東門即禮佛出南門即禮法出西門則禮僧如來在昔親以百頌而讚僧德縱其無道猶囑天龍護祐雖知非聖亦當屏自慢心以聖視之敬之則自獲殊勝福田此是如來親説故知無問長幼有道無道皆應稱為師父所以者何凡有一言可法者皆為我師是故經中教令依法不依人譬如陋瓶盛寶穢囊藏珍不可以其囊穢而棄其珍嫌其瓶陋而捨其寶固道無長幼尊人即是尊己虛心便能納物如來説世間有四不可輕所謂沙彌雖小不可輕能説法利人故王子雖小不可輕能殺活人故星火雖小不可輕能燒萬里岡山故龍子雖小不可輕能摧山傾海故若能彼此恭順則人人自德翕翕法立是故儒門禮儀三百威儀三千釋宗則三千威儀八萬細行自古聖賢莫不由斯嚴身進道倘忽此以為輕則道喪有日法滅在邇矣師初住西來山彼間僧俗不知禮法尊道故示之也乙卯四月十五子夜師夢緇素雲集設新高座請示法要時素多緇少師曰自漢明帝法流震旦人皆依教修證者多爾後人逐名言依經解義證悟者寡故我達磨初祖航海而來掃蕩糟粕不立文字直指人心見性成佛既云不立文字又教老僧今日向什麼處開口所以昔日維摩被文殊一問直得咳嗽不得而今還有能為維摩大士出得一口氣者不妨出看衆無語良久曰衆既為法而來不可入寶山空手而歸老僧常為大衆別唱箇舊家曲調也罷僧出云雖然是箇舊家曲一番提起一番新師曰昔日白侍郎參鳥窠禪師窠曰諸惡莫作衆善奉行自淨其意是諸佛教白曰者箇話三歲孩童亦説得窠曰三歲孩童雖説得八十公公行不得彼時侍郎直饒舌頭吐出三寸亦不能下口屈殺屈殺便下座示得戒因緣佛制受戒必須心境相應然後戒體成就缺一則戒不可得矣言心者謂行人志期出離生死專心希得戒法至誠懇師稟受心無異念也言境者要具法界僧緣僧者謂三師七證三師者一和尚十臘滿足善解經律論三藏如或三藏不能備達亦須律藏通曉得作和尚二羯磨阿闍黎三教授阿闍黎並須善間軌範戒德清高此之二師不論年臘但戒律精通便許為師七證者言其極少方云為七邊地許二並要戒德清淨堪作證明缺一不可數雖滿七而非大戒及不清淨者俱不聽為作證明受者亦不得戒也法者謂依如來聖教白四羯磨如法文無差舛方得成就也界者一自然界二作法界若無此界一切羯磨受戒皆悉空作以無界攝故戒不成就也作法界者有二先結戒場次結大界結法如律文若不在場內受戒在大界內受者一切比丘俱要齊集惟除説欲有一比丘不集諸比丘俱得別衆罪受戒者不得戒也緣者謂三衣鉢具濾水囊六物備足不得苟簡及借替等事受沙彌戒者須備上下二衣及鉢濾囊上衣者謂縵條不得割截若披五條七條割截之衣律制不許深為罪纍下衣者謂涅槃僧此云裙當依律制非俗裙也倘現未備後應造之若與上相違無作不發戒不沾身是為濫廁僧倫罪過彌天何能消他信施既知戒為出生死之舟航趣涅槃之徑路為師者不可不慎依律作法方免自誤誤他之咎其受者豈當輕心苟簡從事既無作不攝難逃賊住之愆授受者鑒諸示沙門衣食論佛制出家修道當依四聖種住一依衣服知足二依飲食知足三依臥具知足四依醫藥知足或有以醫藥攝前第二其第四云依樂斷樂修此謂饒益病比丘故以防病比丘有少病即求勝藥不能勤修聖道故云樂斷斷謂斷諸煩惱樂修謂樂修聖道是以受比丘戒時即為説四依法一依糞掃衣二依乞食三依樹下坐四依腐爛藥由少欲知足一切諸佛聲聞緣覺皆從此生相續不斷故名聖種又此能令正法久住世間不滅故名聖種斯是如來大慈為諸弟子安立産業及所作故説此聖種前之三種是安立産業而捨四種世業一捨農務二捨商賈三捨傭作四捨自在捨此四種惟以乞食一種為出世業此乞食以無貪解脫善根為性故心地觀經云如是四事隨有所得粗細稱心遠離貪求是無垢性諸佛如來三十七品菩提行法皆從此生能令佛法僧寶常不斷絶今之沙門釋子四種全違而求勝妙衣服具足飲食倘有少病即圖貴價藥石得之不念來處缺之則憂惱障起甚至退失道心是故一切諸過皆從此不知足起也智者當其勉諸糞掃衣者是他所棄縱有所污拾回七次浣之而著迦葉尊者終身服之腐爛藥者亦名陳棄藥是陳年腐爛之藥人之所棄有病取而煎服示鐵橈比丘法名開楫菩薩利生必以般若大慧為舟楫六度萬行為櫓棹恆順衆生為風帆煩惱苦海無邊非開般若慈航莫能濟渡群有衆生未盡行願匪窮苟不堅固萬行之鐵橈櫓棹豈能超登彼岸者哉示非渠比丘住山修行無別法休向外綢繆世間多少人鏡裏特迷頭欲覓真蹤迹步行騎水牛非渠不是汝不汝復誰儔覿面不相識孤殺一雙眸六處皆玄門何待一根抽直下須薦取擬議隔山丘驅心踏玄路割肉作瘡疣不存迷悟見凡聖豈能收遊戲毗盧藏坐臥彌勒樓任他劫海燒松下自優遊示洞先禪人夫為真衲子應具參方眼此心自圓成豈從他鑄篆自當穩腳跟休逐時流轉所依師要正所近友宜選四儀必須嚴調心在休遣欲知吾祖道先將佛魔辨向外覓新奇即是法身癬所以真道人不嘗空王膳觸對不忘玄拈䭔把指吮萬法本逍遙惟人自作繭但情不附物憎愛自除剪我先曾告子戒德為首件次明伊自心隨力通經典佛祖所設機搓圓復捺匾肯心不輟疑直透重關鍵近步古哲人潛蹤密履踐頂門眼忽開滿盤惟一臠龍天推將時隨宜代敷演老人於斯際雙眉向空展欲道末後句開口便已殄聊率老婆言書為吾子勉示飛石侍者求書卷道無古今人有利鈍古人於一言半句下即便了當後人根鈍故知識不已示之參究不知一法立一弊生遂以參究二字目為實法二六時中將一句陳年公案左猜右摸苦挨瞌睡便當工夫甚至以打七為奇貨苦練為參禪余昔與古雪兄在顯聖密和尚處亦曾入此社火而雪兄體弱多病獨虧他不顧身命兀坐終宵一時值彼昏沉余以香板一打彼遂連吐黃水數口結冬期滿於自分中依然沒交涉昔我釋迦世尊以正法眼藏付囑大迦葉展轉傳至能祖亦未嘗有教人參究一事後代知識雖多設方便不無利益乃無奈鈍根者何反生種種穿鑿賺自悟門何故聻禪之一字早是強生節目況容葛藤蔓引而復云參究者乎今飛子求指參究工夫余只對之呵呵大笑耳子不契復以紙懇求開示余曰開之即瞎示之添頭何不看你眼裏眸子安在何處飛子擬議余曰許汝參遍諸方或時觸著磕著始老人言不虛也倘或隨今時流認龜作鱉被人以冬瓜印子印之以當生平受用非吾子也見既不同豈能窺老人繩床上轉側時咳嗽者哉飛子其勉之示亦愚禪人學道須識學道方識得方時休問道含元殿裏覓長安古今多少迷顛倒斷除煩惱雖增病迷頭逐影病更狂分別法塵知見立現前歷歷失家鄉暗地追求鑽鬼窟千劫伶俜吃枉屈心心要覓祖師心孰肯將心當下歇本無一物全體露一物圓陀和用吐今人不解殺活機錯夢南能䟕兩路或云隨時方便示大失祖師直指意子今欲學祖師禪剎竿踏倒翻身出師七十一誕晨講觀無量壽佛經上品上生章畢曰昔日世尊降誕一手指天一手指地曰天上天下惟吾獨尊今日山僧有手不能舉有口不能説好生慚愧故將經文為衆重添注腳聊申諸仁者遠來為山僧慶祝須知壽者原無相大衆恁麼祝前後三際斷古今不可得若問未生前開口咽喉噎若問娘生後對面不相識別尋無位人鼻孔即打失畢竟是如何吩咐東風為衆説便下座示禪律禪無律則妙行難操律無禪則玄微莫徹禪非律而僧俗渾淆律非禪祖燈誰續各執一以廢融未免徐六之誚僧俗渾淆則三寶缺一人天何所歸向祖燈不續直指寧傳是故雞足山中在昔禪律並行猶加十二頭陀之行孰不知之今時法末人訛多習俗情取雞足之心而棄雞足之行然心無表示人天靡睹行可目觀起生敬仰是則不言而自信不化而自行明矣室中答問貴州峨半胡居士問參究做工夫時還屬妄想否師曰若論參究真妄不落當做工夫時只心心要明此事真且不見何處有妄可得一知真妄便落狐想去道轉遠如人鑽火盡力鑽求只要見火寧暇顧其竹木鑽具及有得與不得之心哉碧江歐章臣居士謁師就坐師曰居士入道久如答曰可以久則久可以近則近師曰此中儱侗不得畢竟有箇時節因緣答云今日見和尚便是入道之始師曰吾道無門居士向甚麼處入士無語有僧代云弟子已蒙和尚攝受臣云弟子終日閉門了此心為什麼此心不可了師曰居士有心否士云豈得無心師曰有心即可了廣州梁義倩居士問云不斷酒肉修得道否師曰説著修即要斷碧江蘇電生居士問金剛一經切要在那一句上師曰在應如是住如是降伏其心復問前後二偈是同是別師曰前偈要人親見法身後偈欲人了幻即真羊城霍用之居士問云法身不可以色見不可以聲求未審向甚麼處得見師曰向東圊頭見去西湖淨寺五百羅漢像被火焚𤊒有僧問瞎堂禪師云既是漏盡羅漢為甚麼被火焚卻堂云為伊有業識在時識者咸謂失旨有僧問師師曰孤雁撲蘆灰進云意旨畢竟如何師曰漏盡了也新塘居士湛翼周問曰本來心性法請師為指南師曰山僧無法無可與人士曰可有方便某甲處也無師曰喜怒哀樂未發之時看取那箇是你心性士云六祖所謂不思善不思惡正恁麼時那箇是汝本來面目莫是者箇道理麼師曰似則亦似是即未是士云未是之言乞師再示師曰你不是我士曰娘生面目雖不同者點靈光豈有異師曰猶須親見始得士曰何曾欠缺師曰雖然不欠缺爭奈隔關何士無語僧問昔人問趙州和尚云狗子還有佛性也無州云無後有問云狗子還有佛性也無州云有此兩轉語請和尚為學人分析師云者漢固是箇迷己逐物趙州古佛得稱巧手沒凡聖量檢點將來不無滲漏何也不合恁麼惑亂人家男女令後來一隊著有無漢亂向有無邊錯會僧問高峰垂問人人有個影子寸步不移因甚麼踏不著師曰鷂子不污自頂又云指不相傷僧問大徹底人既脫生死因甚麼命根不斷師曰寐語作麼生死既脫且問喚甚麼作命根僧問既是無孔笛且道向何處下口吹師曰教設問者漢近前來遂向耳邊一吹僧問博山粟如禪師設問修證即不無污染即不得畢竟如何修證師曰既無一物何染何證勿錯會好又若要證飢餐渴飲夏祕三近事至禮拜訖師曰什麼處來事云雷峰來師曰彼有何言句事云昨七月十五方丈和尚上堂云今七月十五是佛歡喜日衆僧自恣日正是山僧大罪過處有僧出云如何是和尚大罪過處尚曰珍重僧云南無阿彌陀佛而退師曰老老大大自言有大罪過才被者僧一詰遽惶珍重真敗缺不少矣事云只如和尚又作麼生師曰你試舉看事云如何是和尚大罪過處師曰天不容地不載事欣然禮謝紹興沈居士至舟中問曰頃聞有人往海幢問阿字大師大千世界壞時如來舍利歸在何處得不被他壞也阿曰歸在龍宮海藏後來問和尚答彼云歸在金剛際未審是否師曰金剛際同是一大千世界壞則同壞吾無此語勿捏老僧好士曰畢竟歸在什麼處師曰在居士眸子裏士無對師曰當面失卻士作禮而退淨棠李居士曰弟子近閲今時金剛經諸注各解不一其中玄理奧義固非俗子所知至於事相亦各不同即如胎卵溼化四生事當楷定不易之論何以各解亦異且如溼生云是魚鱉之屬然魚鱉亦是卵生何云溼生言化生謂是蟬蝶之類然蟬則俗子未審蝶本卵生卵成蟲蟲出殼為蝶人皆知之今請和尚詳示以決俗疑師曰余亦久見其謬但未有咨者今為子略而言之凡從胎臟出名為胎生從卵殼出謂之卵生藉溼氣成故曰溼生無而倏有稱為化生俱舍論云溼化染香處謂溼生嗅知生處香氣便生愛染隨所愛合而便結生即如物久不被日暴便生白醭蟲染醭氣而生也化生染處者謂化生隨業見當生處染著結生也其魚鱉蝦蜆等俱屬卵生由蜆蛾散卵於水上而成蜆如蜻蜓點卵於水而成六足蟲已具頭尾硬翅出殼為蜓也蚯蚓與草蟲交染草蟲俗云蛞蚓在地鳴聲已似蟬蚓上樹縮而成殼退殼成蟬於六道中天及地獄皆化生鬼有胎化二生即人中亦具四生昔佛在世毗舍佉母生三十二卵出為波斯匿王三十二將此方寶志公生于鷹巢足猶鳥足溼生昔奈女生於奈花中由藉露潤香氣而有也化生如西域二女生于地下出家為比丘尼皆證阿羅漢果衆生業報受萬類之形皆由識心差別而成非凡所測也士曰非師莫決世疑遂禮謝而退師昔在瀛山雪和尚室侍立次瀛曰先老和尚有垂語三則汝還委悉麼師曰請和尚舉示瀛曰不萌之草為甚能藏香象師曰者畜生欲隱彌露瀛曰古澗寒泉水作什麼色師曰五眼窺不得瀛曰徹底無依向什麼處安身立命師曰鋤破虛空帶活埋馬法雲近事問無位真人常在面門出入未有面門時又向什麼處出入師曰斫卻頭來對你説事云便請和尚抽出活人劍師震威一喝事直得面赤作禮而退僧問明眼人過後安身立命在何處師曰五蘊山前撒手毗盧閣後翻身進云乞請直示學人師曰待你踏倒鐵圍山方向你道吳君虯居士問六祖大師云心平何勞持戒行直何用修禪佛言因戒生定因定發慧佛祖之言豈不互相乖耶師曰佛祖元同一箇鼻孔言無有二也心平者菩薩本源心地戒也菩薩之心猶如大地輿載一切生長萬物初無分別是以用香塗之而不生愛以穢塗之而不生嫌菩薩之心亦復如是觀大地如赤子衆生禮拜讚歎而不生喜衆生瞋罵毀辱亦不生嫌故曰能忍如地是為心平心平即戒戒外無心何勞更持更持則頭上安頭矣禪亦云定亦云三昧梵語三昧華言調直定亦云正定亦云正心行處謂人之心從無始時來常曲不端得此正心行處心即端直心行既直何用更修禪耶是則因戒生定因定發慧佛祖之言互為始終不相乖異明矣但今凡夫淺識執泥文字不悟佛祖隨機説法搓圓捺匾以甜易苦之權宜故多生疑惑而障自悟門也居士曰弟子不因此問焉得萬目開張便禮謝而退王公輔從仙城來象林禮和尚訖云昨大佛寺石蓮禪師上堂田居士出問云竿木隨身事如何蓮曰逢場作戲進云如何是逢場作戲蓮曰者箇進云如何是者箇蓮喝一喝某甲不甘特來請決和尚師曰你試舉看公云竿木隨身事如何師曰要行便行要住即住進云如何是逢場作戲師曰明來明打暗來暗打公欣然禮謝次日一僧到參復舉前話云竿木隨身事如何師曰捩轉乾坤進云恁麼則逢場作戲去也師曰竹梢上搖鈴僧問路逢死蛇莫打殺無底籃子盛將歸來既是死蛇為甚麼莫打殺師曰再犯難容進云籃子何時失卻底師曰問取提籃人進云盛將歸來作麼生師曰供養驢脣長老僧禮退藩下田居士問前公爺甚信用天主教擇日改造衙門皆依其教而公爺不及見工竣而卒於外某未諳其教請和尚示之師曰天竺亦有天主或事大自在天或事大梵天王然梵天王前生為樵夫見火燒山而救滅之因存無量生命住壽過一劫此天地初成時梵王獨住一劫未有梵侶後起念云願諸有情來生此處作是念已梵子即生天竺外道不測便執梵王是常梵子無常故天竺四品人皆事之一婆羅門執云從梵王口生婆羅門華言梵志亦云淨行似此方之儒者二剎帝利執云從梵王齋生剎帝利是大國王種三商賈執云從梵王脅生四農人執云從梵王腳生故各各事之其大自在天王住色界頂字威靈帝主領三千大千世界梵王是娑婆世界主住色界初禪二禪兩楹之中主領小千世界今西洋天主邪教妄無根本不知以何天為主余三十年前已見其書杜撰俚語其名其字甚鄙陋又謂一切人民及三教聖人皆從天主生故不宗事而事天主今有無識之人多信其教昔雲棲大師三筆已有三辨余不須重論矣竹窗三筆云一老宿言有異域人為天主之教者子何不辨豫以為教人敬天善事也奚辨焉老宿曰彼欲以此移風易俗而兼之毀佛謗法賢士良友多信奉者故也因出其書示豫乃略辨其一二彼雖崇事天主而天之説實所未諳按經以證彼所稱天主者忉利天帝也一四天下三十三天之主也此一四天下從一數之而至於千名小千世界則有千天主矣又從一小千數之而復至於千名中千世界則有百萬天主矣又從一中千數之而復至於千名大千世界則有萬億天主矣統此三千大千世界者大自在天王是也彼所稱最尊無上之天主大自在天視之略似周天子視千八百諸侯也彼所知者萬億天主中之一耳餘欲界諸天皆所未知也又上而色界諸天又上而無色界諸天皆所未知也又言天主者無形無色無聲則所謂天者理而已矣何以御臣民施政令行賞罰乎彼雖聰慧未讀佛經何怪乎立言之舛也現前信奉士友皆正人君子表表一時衆所仰瞻以為向背者豫安得避逆耳之嫌而不一罄其忠告乎惟高明下擇芻蕘而電察焉一又聞彼云梵網言一切有生皆宿生父母殺而食之即殺吾父母如是則人亦不得行婚娶是妻妾吾父母也人亦不得置婢僕是役使吾父母也人亦不得乘騾馬是陵跨吾父母也士人僧人不能答如之何豫曰梵網止是深戒殺生故發此論意謂恆沙劫來生生受生生生必有父母安知彼非宿世父母乎蓋恐其或己父母非決其必己父母也若以辭害意舉一例百則儒亦有之禮禁同姓為婚故買妾不知其姓則卜之彼將曰卜而非同姓也則婚之固無害此亦曰娶妻不知其為父母為非父母則卜之卜而非己父母也則娶之亦無害矣禮云倍年以長則父事之今年少居官者何限其舁轎引車張蓋執戟必兒童而後可有長者在焉是以父母為隸卒也如其可通行而不礙佛言獨不可通行乎夫男女之嫁娶以至車馬僮僕皆人世之常法非殺生之慘毒比也故經止云一切有命者不得殺未嘗云一切有命者不得嫁娶不得使令也如斯設難是謂聘小巧之迂談而欲破大道之明訓也胡可得也復次彼書杜撰不根之語未易悉舉如謂人死其魂常在無輪回者既魂常在禹湯文武何不一誡訓於桀紂幽厲乎先秦兩漢唐宋諸君何不一致罰於斯高莽操李楊秦蔡之流乎既無輪回叔子何能託前生為某家子明道何能憶宿世之藏母叉乎羊哀化虎鄧艾為牛如斯之類班班載於儒書不一而是彼皆未知何怪其言之舛也二復次南郊以祀上帝王制也曰欽若昊天曰欽崇天道曰昭事上帝曰上帝臨汝二帝三王所以憲天而立極者也曰知天曰畏天曰律天曰則天曰富貴在天曰知我其天曰天生德於豫曰獲罪於天無所禱也是遵王制集千聖之大成者夫子也曰畏天曰樂天曰知天曰事天亞夫子而聖者孟子也天之説何所不足而俟彼之創為新説也以上所陳倘謂不然乞告聞天主倘豫懷妒忌心立詭異説故沮壞彼主教則天主威靈洞照當使猛烈天神下治之以飭天討三三筆判其以忉利天帝為天主忉利天人間一百歲彼天為一晝夜壽一千歲計人間歲三千六百萬年此是欲界第二天居須彌山頂名地居天世界壞時則同壞何能出於劫數其大梵天王壽一劫半大自在天王同色究竟天壽一萬六千劫世界壞時此天不壞以有阿那含三果聖人居住也今此娑婆世界共有萬億日月須彌山四天下乃至梵天故釋迦如來化千百億身教住衆生以一日月周行四天下光明所照臨是為一世界如是千世界中有千日月是為小千世界爾所小千千世界是為中千世界爾所中千千世界是為大千世界一小千世界如一貫錢一中千世界如千貫錢一大千世界如千千貫錢故有萬億世界成則同成壞則同壞所言劫者梵語劫波此云長時成住壞空各有二十小劫共為八十箇小劫總名一大劫一箇小劫共計一千六百八十萬年二十箇小劫共計三萬三千六百萬年成劫已過壞劫未至今當住劫第九箇小劫減時一大劫共計一十三萬四千四百萬年忉利天帝梵語釋提桓因華言能天主謂能為三十三天主昔為人時姓憍尸迦修建迦葉佛舍利塔三十二人助修共生三十三天憍尸迦為帝三十二為王共為三十三天儒云上帝道云玉帝梵語忉利華言三十三吳震飛居士問維摩經中維摩居士凡見諸二乘聲聞弟子即云唯而見諸菩薩大士則云仁者如是遇五百諸大聲聞阿羅漢初皆云唯如見舍利弗便云唯舍利弗唯目犍連今據唯字之義無非切音微是專辭語辭又訓獨也又烏賄切音委諾也應聲也如曾子曰唯凡彼人有語此人方應諾而舍利弗遇維摩未曾有語維摩何以云唯若作語辭訓之應音微似非本文如遇諸大士亦可云唯何以遇諸聲聞獨云唯古今諸注亦未見有釋今請和尚為弟子開千古之疑師曰此非華言亦非胡語乃天竺梵音但有語而無義天竺人見諸尋常同輩者及後輩人別久忽遇之即呼云唯然後乃敘餘事現今廣州府常人相見猶作此語由昔晉齊梁唐宋代來天竺賈客并諸國商侶常泛舶至廣州而諸譯經法師及高僧多有附舶而至者故昔廣府人多解梵音兼海中諸國人語以便貿易今之廣州鄰郡肇慶府猶多作外國語如稱外祖父則云公帝外祖母則云婆帝陽江縣肇府屬喚外祖父為罨打外祖母為阿低阿俗作亞僧祗律云比丘共公語時不得喚阿公阿郎摩訶羅應言娑路醯多共母語時不得言阿母阿婆應言婆路醯帝然婆帝低三字與律文及外國言音皆相近也何以呼諸大士云仁者而獨呼聲聞二乘人云唯此維摩經是大乘典有彈斥二乘之意故無尊稱之辭也雲棲楞嚴摸久記中以唯字作此方義訓釋是以終不能決也士曰承師釋久疑滯遂作禮而退順治壬辰師在順邑沙灣何隆將居士館度夏時有二僧從曹溪來化繡千佛衣以供六祖居士問師云何名千佛衣師曰斯謬也昔如來在王舍城天帝石窟前經行見有稻田畦畔分明差互得所佛告阿難從今日後作衣當用是畦畔法以刀割截而成不為怨賊所劫奪是諸沙門賢聖幖幟過去千佛弟子著如是衣當來千佛弟子亦著如是衣今時法末人訛不諳經律繡千佛像在衣上雲棲大師正訛集中已有辨矣集云近世袈裟上編繡諸佛云千佛衣此訛也佛像止宜頂戴在首負荷在肩而已懸挂胸膈已涉褻慢況羅綴一身自腰膝而下皆佛也其過可勝言哉輪王福傾諒非虛語而成風久襲不自覺知願高明俯察芻蕘慎勿著此或曰然則千佛衣果無之乎曰有之即今二十五條衣者千佛相傳之衣也佛告比丘我此僧伽黎過去未來諸佛皆著此衣而得解脫是其證也袈裟舊作加沙又作毠毟華言壞色亦云赤色謂用草木皮葉泥等染以壞五大色也義淨法師云梵語加沙野譯為赤色即乾陀之色元來不干東夏之言何勞下底置衣葛洪字苑始從衣也如是因色名衣非今應赴所著五彩者佛言當來將我袈裟變為五彩是末法之衰相也若以義表或名福田衣能生衆善故亦名解脫服以解脫貪瞋癡諸煩惱故又名離塵服由斷六塵故又名蓮花服由不為六塵所染故其義非一詳載標釋畦音奚畔音叛皆田界也僧伽黎華言重復衣謂割之合成故也亦名雜碎衣以條數多故乾陀華言赤色即赤色樹皮也省城李慧菴居十問今有長髮不剃者謂之頭陀復有剃髮留鬚者謂之表丈夫以為宗門有道之相佛教中果有是乎師曰佛之教法萬國皆同無有二制天竺梵語頭陀亦云杜多華言抖擻以能抖擻三界貪愛等諸煩惱謂比丘當離憒鬧不樂飾好心絶貪求清淨自居以修正道其行故有十二一住阿蘭若寂淨處離村五六里牛羊所不到處二常乞食不受他請三次第乞不擇貧富常行平等四一食日中一食午前不數數食妨廢修道五節量食不飢不飽身心輕安易修道業六過中不飲漿以果壓汁名漿及糖蜜漿以絶愛著貪求也七著敝衲衣亦名糞掃衣拾他所棄敝物浣濯令淨納成為衣以絶色好不招賊難八但三衣一五條衣二七條衣三二十五條衣不多不少足蓋形體勤修道業九冢間坐觀他尸骨作不淨想深生厭離他既如是我寧免之不惜自身勤修道行十樹下坐樹蔭清涼心易寂定十一露地坐隨意快樂月光遍照令心明利易入空定十二常坐不臥行住坐臥四威儀中坐為第一氣息調和心易入道若懈怠眠諸食瞋癡煩惱魔常得其便是故脅不著席此十二行迦葉尊者終身行之未聞有披髮之事故佛讚其德超人天除佛一人無能及者若比丘行之則自莊嚴二百五十戒法不行亦無過昔高峰大師悟後復於懸崖上立一丈室榜曰死關不設床座不用侍人三年後出關髮長過肩即遣人剃除非任其自若也或云髮不礙道殊不知正礙道正像法時有在家修行能證得須陀洹初果斯陀含二果阿那含三果而不能證阿羅漢四果若其出家鬚髮才落時即證阿羅漢果若在家菩薩不剃則可出家為僧受二百五十大戒是住持三寶之一數佛制比丘住蘭若無人剃髮極長二指可一寸餘今非無人剃又非閉死關以馱髮為頭陀名實俱謬正訛集云有既不剃落又不簪冠剪髮齊眉號曰頭陀此訛也頭陀梵語華言抖擻具足十二苦行擺脫塵垢清淨無染故云抖擻佛言有頭陀行則我法久存無頭陀行則我法滅頭陀關佛法盛衰而乃以異色人濫其稱乎若夫在死關而髮長不剃如天目高峰大師者斯真頭陀矣復有剃髮不剃鬚者駕言削髮除煩惱留鬚表丈夫此訛也髮云煩惱則鬚之煩惱尤甚鬚表丈夫則孟子所稱大丈夫者乃在躬仁義貞窮達一死生而已張良狀貌如婦人女子而心雄萬夫奚以鬚為哉如是違佛明制顯異惑衆之流擯而斥之毋令混入於緇門可也阿羅漢華言無生謂不受後世死生也正像法佛法有三時佛涅槃後正法有一千年次像法有一千年三末法有三萬年今時當末法人有修行不能證果鄧實峰居士問牛乳是素否師曰乙未歲余受鍾山徐子伯昌請館中結冬時昌母年鄰八旬曾從余稟奉歸戒長齋三十餘載然昌性至孝見母耄弱齋戒彌謹無可以為甘旨私衷怵然邈思古媳有將己乳哺姑意欲以牛乳奉之母弗聽猶豫未決乃就余請曰餌乳將無違齋乎余睹其孝念惓惓因語天竺國人無論葷素悉尚乳酪醍醐凡所敬尊宴客咸皆用之其醍醐本乳鍊成能痊百病故其俗多牧牛𤚼乳必留餘以飼其犢佛因順俗而聽食之如子飲母乳故非葷也向聞此方𤚼乳者惟利多乳不留餘以活其犢是即因乳傷命不可食也昌曰比來牛價頗藉人多愛惜其子𣪬分其乳以鬻耳余曰如若言者權食無妨也邇聞牛直不充𣪬乳多戕厥犢是知乳從奪命中來固不合食也如有虛損重病及衰耄者飲食難進藥餌不瘳必非戕傷其犢生大慚愧服者庶幾脫無重病衰老決不可食也音釋修多羅此云契經謂佛所説經上契諸佛之心下契衆生之機也今單言經是略也三藏經律論也十二分經佛所説法教分十二以統八萬法藏一曰修多羅如上釋謂直説法相長行之義也二曰重頌謂重頌上長行直説也三曰授記謂佛授三乘人得道記也四曰孤起謂不重頌名孤起即偈頌也五曰無問自説謂無人請問佛自説也六曰因緣謂佛説緣起事也七曰譬喻謂佛假言辭以説諸法也入曰本事謂佛説聲聞弟子前世事也九曰本生謂佛説菩薩行因本曾為事也十曰方廣謂佛説大乘方廣之理也正理為方包富名廣十一曰未曾有謂佛説希有之法或現神通衆生歎未曾有也十二曰論義謂佛答其問者釋其所以也玳同玳音代玳瑁狀似龜甲有文可飾器物瑁音妹雞足山在中天竺摩竭國王舍城東南雞足山直上三峰狀如雞足迦葉尊者捧袈裟入中寂定二峰斂覆當來彌勒佛登山彈指峰開迦葉授衣與彌勒月空化火焚身入滅也因迦葉入定亦名尊足山四料揀永明壽禪師戒無證悟人勿輕淨土故示以料揀一曰有禪無淨土十人九錯路陰境若現前瞥爾隨他去言陰境者謂於禪定中五陰魔發現如楞嚴經明十種魔事其人初不覺著魔迷惑自謂得無上道死墮阿鼻地獄也二曰無禪有淨土萬修萬人去但得見彌陀何愁不開悟三曰有禪有淨土猶如戴角虎現世為人師來生作佛祖四曰無禪無淨土鐵床并銅柱萬劫與千生沒箇人依怙謂死墮地獄臥鐵床抱紅銅柱萬劫千生不復人身也堪忍亦云能忍梵語娑婆是也謂此世界衆生堪能忍受貪嗔癡及諸煩惱衆苦之噁不求解脫出離生死故名忍土也八苦一生苦二老苦三病苦四死苦五恩愛別離苦六所求不得苦七怨憎會苦八大小諸橫憂悲苦黐音癡黐膠所以黏鳥獸也蜢音猛蚱蜢似蝗非蝗有尖頭有大頭翅有兩重能飛能跳食草木葉江南名草蟲嶺南名蜢蚱音責大者能鳴由其聲嘖嘖也醭音撲物久生白醭圊音青廁也𣪬音遘取牛乳也比丘此云乞士外乞食以資身內乞法以資心亦云怖魔謂比丘受二百五十大戒魔王驚怖也舍利此云靈骨師父為人模範曰師謂教人以道之稱也生我戒身長我慧命曰父有作師傅師傅是官名俗稱名儒能講論六藝者曰師傅弟子學在師後名弟解從師生名子六賊色聲香味觸法之六塵也能劫奪眼耳鼻舌身意之六根罨打上遏合切音姶平聲下音打平聲此皆外國語非天竺梵音也維摩梵音俱云維摩詰華言淨名是東方無動佛妙喜世界菩薩示生此娑婆界贍部洲中天竺毗耶離城原是金粟如來示現也即如觀音菩薩是古正法明如來為化衆生故今復示現菩薩身也習氣大經云煩惱名字略説則三毒廣説則三界九十八使煩惱習者名煩惱殘氣若身業口業不隨智慧似從煩惱起非實煩惱久習煩惱故起如是業二乘聖人雖得漏盡而有煩惱習如火燒薪已灰炭猶在火力薄故不能盡若世界盡時劫火燒三千大千世界無復遺餘由火力大故佛一切智亦復如是燒諸煩惱無復殘習煩惱者煩燒也惱迷惑惱亂也即一切善惡妄想從無始來被此妄想燒然惱亂迷惑驅使流轉三界不得故亦名惑亦名使也
